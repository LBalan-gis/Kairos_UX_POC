      // LAYER 6b — Renderer
      // ─────────────────────────────────────────────────────────────────
      class Renderer {
        constructor(pkg, liveSignal, incidentEngine, decisionEngine, projection, uiState) {
          this.pkg            = pkg;
          this.liveSignal     = liveSignal;
          this.incidentEngine = incidentEngine;
          this.decisionEngine = decisionEngine;
          this.projection     = projection;
          this.uiState        = uiState;

          // DOM refs
          this.board         = document.getElementById("board");
          this.viewport      = document.getElementById("viewport");
          this.nodeLayer     = document.getElementById("nodeLayer");
          this.edgeSvg       = document.getElementById("edgeSvg");
          this.edgeLayer     = d3.select("#edgeLayer");
          this.actionsBar    = document.getElementById("actionsBar");
          this.focusExit     = document.getElementById("focusExit");
          this.commandBtn    = document.getElementById("commandBtn");
          this.commandMenu   = document.getElementById("commandMenu");
          this.commandInput  = document.getElementById("commandInput");
          this.commandList   = document.getElementById("commandList");

          // Internal state
          this.chartInstances  = {};
          this.framePending    = false;
          this.dragging        = null;
          this.commandHistory  = [];
          this.subgraph        = null;
          this.projRelations   = null;

          // D3 zoom
          this.zoom = d3.zoom().scaleExtent([0.5, 2.2]).filter((event) => {
            if (this.dragging) return false;
            const target = event.target;
            if (target && target.closest && target.closest(".node")) return false;
            return !event.ctrlKey || event.type === "wheel";
          }).on("zoom", (event) => {
            this.uiState.transform = event.transform;
            this.viewport.style.transform = `translate(${event.transform.x}px,${event.transform.y}px) scale(${event.transform.k})`;
            this.renderZoneSwimlanes();
          });

          d3.select(this.board).call(this.zoom).on("dblclick.zoom", null);
          d3.select(this.board).on("dblclick", () => { this.fitToScene(true); });
        }

        boot() {
          // Build subgraph + projection relations
          this.subgraph      = this.incidentEngine.extract("deviation");
          this.projRelations = buildProjectionRelations(this.subgraph);

          // Layout
          let persisted = this.uiState.load();
          if (persisted && persisted.positions && !LayoutEngine.persistedPositionsAreValid(persisted.positions)) {
            try { localStorage.removeItem(this.uiState.storage_key); } catch (_) {}
            persisted = null;
          }
          // Force fresh layout if storage key changed (v23) to pick up zone ordering
          if (persisted && persisted.storageVersion !== "v23") {
            try { localStorage.removeItem(this.uiState.storage_key); } catch (_) {}
            persisted = null;
          }
          this.uiState.positions = LayoutEngine.run(this.subgraph, this.projRelations, persisted?.positions || {});
          if (!LayoutEngine.persistedPositionsAreValid(persisted?.positions || {})) {
            this._enforceZoneOrder(this.uiState.positions);
          }
          this.uiState.focus     = persisted?.focus || null;
          this.uiState.transform = d3.zoomIdentity;

          // Restore expanded nodes
          if (persisted?.expandedNodes) {
            persisted.expandedNodes.forEach((id) => this.uiState.expandedNodes.add(id));
          }

          // Wire up events
          this._bindActionEvents();
          this._bindFocusExit();
          this._bindCommandSurface();
          this._bindTimelineEvents();
          this._bindHotkeys();
          this._bindBoardClick();
          this._bindResize();

          // Render
          this.scheduleRender();

          // Live signal subscription
          this.liveSignal.addEventListener("signal", () => {
            this._updateSignalAges();
            this._tickCharts();
          });
          this.liveSignal.start(2400);

          // Age display every second
          setInterval(() => { this._updateSignalAges(); }, 1000);

          // Initial fit + restore focus
          requestAnimationFrame(() => {
            this.fitToScene(false);
            if (this.uiState.focus) this.enterFocusMode(this.uiState.focus, { center: false });
          });

          // Decision banner
          this.decisionEngine.populateBanner("deviation");

          // Save on unload
          window.addEventListener("beforeunload", () => {
            this.uiState.save();
          });
        }

        // ── Helpers ──────────────────────────────────────────────────

        _bindBoardClick() {
          this.board.addEventListener("click", (e) => {
            if (this.uiState.actionMode && !this.dragging && !e.target.closest(".node")) {
              this.exitFocusMode();
            }
          });
        }

        _bindResize() {
          window.addEventListener("resize", () => {
            this.scheduleRender();
            requestAnimationFrame(() => this.fitToScene(false));
          });
        }

        defaultFocusSeeds(focusId) {
          const map = {
            deviation:    ["asset_sealer","quality_seal","batch_current","batch_golden","impact_loss","sensor_tension","control_heater","material_foil"],
            batch_current:["quality_seal","sim_unchanged","sim_corrected","impact_loss"],
            impact_loss:  ["sim_unchanged","sim_corrected","sys_mes","sys_qa","sys_erp"],
            sys_mes:      ["impact_loss","sim_unchanged","sim_corrected"],
            sys_qa:       ["deviation","sim_unchanged"],
            sys_erp:      ["impact_loss","sim_corrected"]
          };
          return map[focusId] || [];
        }

        getConnectedImpactNeighborhood(rootId) {
          const relations  = this.projRelations || [];
          const entityIds  = new Set(this.subgraph.entities.map((e) => e.id));
          const nodeIds    = new Set([rootId]);
          const edgeIds    = new Set();

          let frontierUp = [rootId];
          for (let depth = 0; depth < 3; depth += 1) {
            const next = [];
            frontierUp.forEach((id) => {
              relations.forEach((r) => {
                if (r.to === id && entityIds.has(r.from) && entityIds.has(r.to)) {
                  nodeIds.add(r.from); nodeIds.add(r.to); edgeIds.add(r.id); next.push(r.from);
                }
              });
            });
            frontierUp = next;
            if (!frontierUp.length) break;
          }

          let frontierDown = [rootId];
          for (let depth = 0; depth < 4; depth += 1) {
            const next = [];
            frontierDown.forEach((id) => {
              relations.forEach((r) => {
                if (r.from === id && entityIds.has(r.from) && entityIds.has(r.to)) {
                  nodeIds.add(r.from); nodeIds.add(r.to); edgeIds.add(r.id); next.push(r.to);
                }
              });
            });
            frontierDown = next;
            if (!frontierDown.length) break;
          }

          return { nodeIds: Array.from(nodeIds), edgeIds: Array.from(edgeIds) };
        }

        enterFocusMode(nodeId, options = {}) {
          const neighborhood = options.neighborhood || this.getConnectedImpactNeighborhood(nodeId);
          const center = options.center !== false;
          this.uiState.focus      = nodeId;
          this.uiState.actionMode = true;
          this.applyFocus(nodeId, { neighborhood, center, seedIds: options.seedIds || [] });
          this.nodeLayer.querySelectorAll(".node").forEach((el) => {
            el.classList.toggle("focus-root", el.getAttribute("data-id") === nodeId);
          });
          if (this.focusExit) this.focusExit.classList.add("show");
          this.updateActionsForFocus(nodeId, new Set(neighborhood.nodeIds || []));
        }

        exitFocusMode() {
          this.uiState.focus      = null;
          this.uiState.actionMode = false;
          this.nodeLayer.querySelectorAll(".node").forEach((el) => {
            el.classList.remove("dimmed","focal","focus-root","expanded");
          });
          this.edgeLayer.selectAll("path.edge").classed("focused", false).classed("dimmed", false);
          this.edgeLayer.selectAll("text.edge-label").classed("focused", false);
          if (this.focusExit) this.focusExit.classList.remove("show");
          if (this.actionsBar) {
            this.actionsBar.querySelectorAll(".action-btn").forEach((btn) => {
              btn.classList.remove("active","dimmed");
            });
          }
          this.fitToScene(true);
        }

        applyFocus(focusId = this.uiState.focus, options = {}) {
          const { center = true, seedIds = [], neighborhood = null } = options;
          if (!focusId) { this.exitFocusMode(); return; }
          this.uiState.focus = focusId;
          const resolvedNeighborhood = neighborhood || this.getConnectedImpactNeighborhood(focusId);
          const keepNodes = new Set((resolvedNeighborhood.nodeIds || []).concat(seedIds || [], [focusId]));
          const keepEdges = new Set(resolvedNeighborhood.edgeIds || []);

          if (!neighborhood && seedIds && seedIds.length) {
            seedIds.forEach((sid) => {
              this.projRelations.forEach((r) => {
                if ((r.from === sid || r.to === sid) && keepNodes.has(r.from) && keepNodes.has(r.to)) {
                  keepEdges.add(r.id);
                }
              });
            });
          }

          this.nodeLayer.querySelectorAll(".node").forEach((el) => {
            const id        = el.getAttribute("data-id");
            const isCompact = el.classList.contains("compact-card");
            el.classList.toggle("dimmed",    !keepNodes.has(id));
            el.classList.toggle("focal",      id === focusId);
            el.classList.toggle("focus-root", id === focusId);
            el.classList.toggle("expanded",  keepNodes.has(id) && isCompact);
          });

          this.edgeLayer.selectAll("path.edge")
            .classed("focused", (d) => !!(d && d.r && keepEdges.has(d.r.id)))
            .classed("dimmed",  (d) => !!(d && d.r && !keepEdges.has(d.r.id)));
          this.edgeLayer.selectAll("text.edge-label")
            .classed("focused", (d) => !!(d && d.r && keepEdges.has(d.r.id)));

          this.updateActionsForFocus(focusId, keepNodes);
          if (this.focusExit) this.focusExit.classList.add("show");
          if (center) this.centerOnNodes(Array.from(keepNodes), true, 0.72);
        }

        updateActionsForFocus(focusId, keepNodes) {
          if (!this.actionsBar) return;
          this.actionsBar.querySelectorAll(".action-btn").forEach((btn) => {
            const scope  = (btn.getAttribute("data-focus") || "").split(",").map((s) => s.trim()).filter(Boolean);
            const active = scope.includes(focusId) || scope.some((id) => keepNodes.has(id));
            btn.classList.toggle("active",  active);
            btn.classList.toggle("dimmed", !active);
          });
        }

        getBoundsFor(ids) {
          const targetIds = Array.isArray(ids) && ids.length ? ids : this.subgraph.entities.map((e) => e.id);
          const rects     = targetIds.map((id) => this._nodeRect(id)).filter(Boolean);
          if (!rects.length) return null;
          const minX = Math.min(...rects.map((r) => r.x));
          const minY = Math.min(...rects.map((r) => r.y));
          const maxX = Math.max(...rects.map((r) => r.x + r.w));
          const maxY = Math.max(...rects.map((r) => r.y + r.h));
          return { minX, minY, maxX, maxY, width: maxX - minX, height: maxY - minY };
        }

        // Shift nodes so zones appear strictly left-to-right in A→B→C→D→E→F order
        _enforceZoneOrder(positions) {
          const ZONE_ORDER = ['A','B','C','D','E','F'];
          const INTER_ZONE_GAP = 120; // minimum px gap between zone columns
          const zoneMap = this.projection.zoneMap;

          // Compute current X range per zone
          const zoneRanges = {};
          this.subgraph.entities.forEach((e) => {
            const zone = zoneMap[e.id];
            if (!zone || !positions[e.id]) return;
            const x = positions[e.id].x;
            const w = LayoutEngine.estimate(e).width;
            if (!zoneRanges[zone]) zoneRanges[zone] = { minX: x, maxX: x + w };
            else {
              zoneRanges[zone].minX = Math.min(zoneRanges[zone].minX, x);
              zoneRanges[zone].maxX = Math.max(zoneRanges[zone].maxX, x + w);
            }
          });

          const present = ZONE_ORDER.filter((z) => zoneRanges[z]);
          if (present.length < 2) return;

          // Walk zones in order and push each one right if it overlaps the previous
          let cursor = zoneRanges[present[0]].minX; // keep Zone A where it is
          present.forEach((zone) => {
            const r = zoneRanges[zone];
            const needed = cursor - r.minX;
            if (needed > 0 || r.minX < cursor) {
              // shift all nodes in this zone
              this.subgraph.entities.forEach((e) => {
                if (zoneMap[e.id] === zone && positions[e.id]) {
                  positions[e.id] = { x: positions[e.id].x + needed, y: positions[e.id].y };
                }
              });
              r.maxX += needed;
              r.minX  = cursor;
            }
            cursor = r.maxX + INTER_ZONE_GAP;
          });
        }

        fitToScene(animated = true) {
          const incidentIds = ["batch_golden","material_foil","sensor_tension","control_heater","asset_sealer","deviation","quality_seal","batch_current","sim_unchanged","sim_corrected","impact_loss","sys_mes","sys_qa","sys_erp"];
          const b = this.getBoundsFor(incidentIds);
          if (!b) return;
          const viewW = this.board.clientWidth;
          const viewH = this.board.clientHeight;
          const pad   = 60;
          const fitW  = (viewW - pad * 2) / Math.max(1, b.width);
          const fitH  = (viewH - pad * 2) / Math.max(1, b.height);
          const scale = Math.max(0.55, Math.min(2.2, Math.min(fitW, fitH)));
          document.documentElement.style.setProperty("--fit-scale", scale);
          let tx      = (viewW - b.width * scale) / 2 - b.minX * scale;
          const ty    = (viewH - b.height * scale) / 2 - b.minY * scale;
          const gutter = 120;
          const minTx  = gutter - b.minX * scale;
          const maxTx  = (viewW - gutter) - b.maxX * scale;
          if (minTx <= maxTx) tx = Math.max(minTx, Math.min(maxTx, tx));
          else tx = (minTx + maxTx) / 2;
          const t   = d3.zoomIdentity.translate(tx, ty).scale(scale);
          const sel = d3.select(this.board);
          if (animated) sel.transition().duration(260).call(this.zoom.transform, t);
          else sel.call(this.zoom.transform, t);
        }

        centerOnNodes(ids, animated = true, minScale = 0.72) {
          const b = this.getBoundsFor(ids);
          if (!b) return;
          const viewW = this.board.clientWidth;
          const viewH = this.board.clientHeight;
          const pad   = 160;
          const scale = Math.max(minScale, Math.min(2.2, Math.min((viewW - pad * 2) / b.width, (viewH - pad * 2) / b.height)));
          let tx      = (viewW - b.width * scale) / 2 - b.minX * scale;
          const ty    = (viewH - b.height * scale) / 2 - b.minY * scale;
          const gutter = 100;
          const minTx  = gutter - b.minX * scale;
          const maxTx  = (viewW - gutter) - b.maxX * scale;
          if (minTx <= maxTx) tx = Math.max(minTx, Math.min(maxTx, tx));
          else tx = (minTx + maxTx) / 2;
          const t   = d3.zoomIdentity.translate(tx, ty).scale(scale);
          const sel = d3.select(this.board);
          if (animated) sel.transition().duration(260).call(this.zoom.transform, t);
          else sel.call(this.zoom.transform, t);
        }

        scheduleRender() {
          if (this.framePending) return;
          this.framePending = true;
          requestAnimationFrame(() => {
            this.framePending = false;
            this.render();
          });
        }

        render() {
          this.renderNodes();
          this.renderEdges();
          this.renderCharts();
          requestAnimationFrame(() => {
            this._resizeCharts();
            this.renderZoneSwimlanes();
          });
          if (this.uiState.actionMode && this.uiState.focus) {
            const neighborhood = this.getConnectedImpactNeighborhood(this.uiState.focus);
            this.applyFocus(this.uiState.focus, { center: false, neighborhood });
          }
        }

        // ── Node rendering ────────────────────────────────────────────

        _stateToken(entity) {
          if (entity.type === "ExternalSystem")     return "external";
          if (entity.type === "SimulationScenario") return "simulation";
          return entity.state || "normal";
        }

        _nodeClass(entity) {
          const typeClass = entity.type.toLowerCase().replace(/\s+/g, '');
          if (entity.type === "GoldenBatch" || entity.id === "batch_current") return `anchor-card ${typeClass}`;
          if (entity.type === "SimulationScenario") return `simulation-card ${typeClass}`;
          if (entity.type === "ExternalSystem")     return `system-card ${typeClass}`;
          return `process-card ${typeClass}`;
        }

        _nodeTier(entity) {
          if (["deviation","batch_current","quality_seal","impact_loss"].includes(entity.id)) return "tier-primary";
          if (["asset_sealer","batch_golden"].includes(entity.id))                             return "tier-secondary";
          if (["material_foil","sensor_tension","control_heater"].includes(entity.id))         return "tier-tertiary";
          if (["sys_mes","sys_qa","sys_erp"].includes(entity.id))                             return "tier-endpoint";
          return "";
        }

        _nodeModeClass(entity) {
          if (["sys_mes","sys_qa","sys_erp"].includes(entity.id))                                                       return "endpoint-card";
          if (["deviation","batch_current","quality_seal","impact_loss"].includes(entity.id))                           return "analytical-card";
          if (["asset_sealer","material_foil","sensor_tension","control_heater","batch_golden"].includes(entity.id))    return "operational-card";
          return "";
        }

        _ageText(entityId) {
          const ts  = this.liveSignal.getUpdatedAt(entityId);
          if (!ts) return "";
          const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
          if (sec < 60) return `${sec}s ago`;
          return `${Math.floor(sec / 60)}m ago`;
        }

        _cardHtml(entity) {
          const accent  = ACCENT[entity.type] || ["#8d99af", "#edf2fb"];
          const s       = STATE_STYLE[this._stateToken(entity)] || STATE_STYLE.normal;
          const metrics = Object.entries(entity.metrics || {}).map(([k, v]) => `<div class="metric"><span>${k}</span><b>${v}</b></div>`).join("");
          const p = Number.isFinite(entity.root_cause_probability)
            ? entity.root_cause_probability
            : null;
          const probabilityBlock = (entity.projectionRole === "cause" && p !== null)
            ? `<div class="metric-probability"><span>Root cause likelihood</span><b>${Math.round(p * 100)}%</b></div>`
            : "";
          const primaryAnalytical = new Set(["deviation","batch_current","quality_seal","impact_loss"]);
          const compactIds        = new Set(["material_foil","sensor_tension","control_heater","sys_mes","sys_qa","sys_erp"]);
          const probClass = (entity.projectionRole === "cause" && p !== null)
            ? (p > 0.5 ? "prob-high" : p >= 0.25 ? "prob-medium" : "")
            : "";
          const extraClass = [
            primaryAnalytical.has(entity.id) ? "primary-analytical" : "",
            entity.id === "deviation"     ? "incident-root"  : "",
            entity.id === "batch_golden"  ? "reference-node" : "",
            compactIds.has(entity.id)     ? "compact-card"   : "",
            this._nodeTier(entity),
            this._nodeModeClass(entity),
            probClass
          ].filter(Boolean).join(" ");

          const isSignal  = ["Sensor","QualityState","ControlParameter","Asset"].includes(entity.type);
          const age       = isSignal ? this._ageText(entity.id) : "";
          const ageStale  = (isSignal && (Date.now() - this.liveSignal.getUpdatedAt(entity.id)) > 30000) ? " stale" : "";
          const confidence = entity.metadata?.confidence;
          const extraDetail = compactIds.has(entity.id)
            ? `<div class="extra-detail">${entity.metadata?.detail || entity.metadata?.description || ""}</div>`
            : "";
          const chartBlock = entity.chart ? (() => {
            const goldenCompare = new Set(["batch_current","quality_seal","impact_loss"]);
            const hasRanges     = goldenCompare.has(entity.id);
            const refLabel      = hasRanges ? `<span class="spark-ref-label">vs. Golden Batch GB-2024-01</span>` : "";
            const rangeCtrl     = hasRanges
              ? `<div class="spark-range" id="spark-range-${entity.id}"><button class="spark-range-btn" data-range="30m">30m</button><button class="spark-range-btn active" data-range="1h">1h</button><button class="spark-range-btn" data-range="4h">4h</button></div>`
              : "";
            const header = (refLabel || rangeCtrl) ? `<div class="spark-controls">${refLabel}${rangeCtrl}</div>` : "";
            return `${header}<div class="spark"><canvas id="chart-${entity.id}"></canvas></div>`;
          })() : "";

          return `
            <article class="node ${this._nodeClass(entity)} ${extraClass}" id="node-${entity.id}" data-id="${entity.id}" style="--accent:${accent[0]};--icon-bg:${accent[1]};--state-border:${s[0]};--state-bg:${s[1]};--state-fg:${s[2]}">
              <div class="node-header">
                <div class="node-header-main">
                  <div class="icon-chip">${ICON[entity.type] || "•"}</div>
                  <div><div class="title node-title">${entity.label}</div><div class="section-label">${entity.type}</div></div>
                </div>
                <span class="state node-status"><i></i>${this._stateToken(entity).toUpperCase()}</span>
              </div>
              <div class="node-body">
                <div class="sub">${entity.metadata?.description || ""}</div>
                ${age ? `<div class="signal-age${ageStale}">Updated ${age}</div>` : ""}
                <div class="metrics">${metrics}</div>
                ${probabilityBlock}
                ${entity.insight ? `<button class="insight-chip" data-focus="${entity.id}"><i></i><span><strong>KairOS</strong><br>${entity.insight}${confidence ? `<br><span class="sub">Confidence ${confidence}</span>` : ""}</span></button>` : ""}
                ${extraDetail}
                ${chartBlock}
              </div>
            </article>`;
        }

        renderNodes() {
          const insightFocusMap = {
            sensor_tension: { root: "deviation",     seeds: ["asset_sealer","quality_seal"] },
            control_heater: { root: "asset_sealer",  seeds: ["deviation"] },
            deviation:      { root: "impact_loss",   seeds: ["sim_corrected","sim_unchanged"] },
            quality_seal:   { root: "batch_current", seeds: ["impact_loss"] },
            batch_current:  { root: "sim_corrected", seeds: ["impact_loss","batch_golden"] },
            aux_sensor_2:   { root: "aux_asset_2",   seeds: [] }
          };

          this.nodeLayer.innerHTML = this.subgraph.entities.map((e) => this._cardHtml(e)).join("");

          this.subgraph.entities.forEach((e) => {
            const el = this.nodeLayer.querySelector(`[data-id="${e.id}"]`);
            if (!el) return;
            const p  = this.uiState.positions[e.id] || { x: 0, y: 0 };
            el.style.width = "max-content";
            el.style.left  = `${p.x}px`;
            el.style.top   = `${p.y}px`;

            el.querySelectorAll(".insight-chip").forEach((chip) => {
              chip.addEventListener("click", (ev) => {
                ev.stopPropagation();
                const target = insightFocusMap[e.id];
                if (target) this.enterFocusMode(target.root, { seedIds: target.seeds, center: true });
                else this.enterFocusMode(e.id, { center: true });
              });
            });

            const nodeBody = el.querySelector(".node-body");
            if (nodeBody && el.classList.contains("compact-card")) {
              nodeBody.addEventListener("click", (ev) => {
                if (ev.target.closest(".insight-chip")) return;
                ev.stopPropagation();
                el.classList.toggle("expanded");
              });
            }

            el.addEventListener("click", (ev) => {
              ev.stopPropagation();
              this.enterFocusMode(e.id, { center: false });
            });

            this._bindNodeDrag(el, e.id);
          });
        }

        _nodeRect(id) {
          const el = this.nodeLayer.querySelector(`[data-id="${id}"]`);
          const p  = this.uiState.positions[id];
          if (!el || !p) return null;
          const w  = el.offsetWidth;
          const h  = el.offsetHeight;
          return { x: p.x, y: p.y, w, h, cx: p.x + w / 2, cy: p.y + h / 2 };
        }

        _bindNodeDrag(el, entityId) {
          if (entityId === "batch_golden") return;
          el.addEventListener("pointerdown", (e) => {
            if (e.button !== 0) return;
            e.stopPropagation();
            const rect = el.getBoundingClientRect();
            this.dragging = { id: entityId, ox: e.clientX - rect.left, oy: e.clientY - rect.top, moved: false };
            el.classList.add("dragging");
            el.setPointerCapture(e.pointerId);
          });

          el.addEventListener("pointermove", (e) => {
            if (!this.dragging || this.dragging.id !== entityId) return;
            this.dragging.moved = true;
            const boardRect = this.board.getBoundingClientRect();
            const t = this.uiState.transform || d3.zoomIdentity;
            const localX = (e.clientX - boardRect.left - t.x) / t.k - this.dragging.ox;
            const localY = (e.clientY - boardRect.top  - t.y) / t.k - this.dragging.oy;
            this.uiState.positions[entityId] = { x: Math.max(20, localX), y: Math.max(20, localY) };
            el.style.left = `${this.uiState.positions[entityId].x}px`;
            el.style.top  = `${this.uiState.positions[entityId].y}px`;
            this.renderEdges();
            this.renderZoneSwimlanes();
            if (this.uiState.focus) {
              const neighborhood = this.getConnectedImpactNeighborhood(this.uiState.focus);
              this.applyFocus(this.uiState.focus, { center: false, neighborhood });
            }
          });

          const onUp = (e) => {
            if (!this.dragging || this.dragging.id !== entityId) return;
            try { el.releasePointerCapture(e.pointerId); } catch (_) {}
            const moved = this.dragging.moved;
            this.dragging = null;
            el.classList.remove("dragging");
            if (!moved) {
              this.enterFocusMode(entityId, { center: false });
            } else {
              this.uiState.save();
              if (this.uiState.focus) {
                const neighborhood = this.getConnectedImpactNeighborhood(this.uiState.focus);
                this.applyFocus(this.uiState.focus, { center: false, neighborhood });
              }
            }
          };

          el.addEventListener("pointerup",     onUp);
          el.addEventListener("pointercancel", onUp);
        }

        _updateSignalAges() {
          this.nodeLayer.querySelectorAll(".node[data-id]").forEach((el) => {
            const id    = el.getAttribute("data-id");
            const ageEl = el.querySelector(".signal-age");
            if (!id || !ageEl) return;
            const txt = this._ageText(id);
            if (txt) ageEl.textContent = `Updated ${txt}`;
            const ts = this.liveSignal.getUpdatedAt(id) || 0;
            ageEl.classList.toggle("stale", (Date.now() - ts) > 30000);
          });
        }

        // ── Edge rendering ────────────────────────────────────────────

        _edgePath(a, b) {
          const dx = b.cx - a.cx;
          const sx = dx >= 0 ? a.x + a.w : a.x;
          const ex = dx >= 0 ? b.x : b.x + b.w;
          const c1 = sx + Math.max(30, Math.abs(dx) * 0.26) * Math.sign(dx || 1);
          const c2 = ex - Math.max(30, Math.abs(dx) * 0.22) * Math.sign(dx || 1);
          return `M ${sx} ${a.cy} C ${c1} ${a.cy}, ${c2} ${b.cy}, ${ex} ${b.cy}`;
        }

        renderEdges() {
          const primarySpineEdges = new Set(["r4","r5","r6","r7"]);
          const spineEdges        = new Set(["r1","r2","r3","r4","r5","r6","r7"]);
          const branchEdges       = new Set(["r9","r10","r11","r12"]);
          const execEdges         = new Set(["r13","r14","r15","r16"]);
          const entityById        = new Map(this.subgraph.entities.map((e) => [e.id, e]));

          const renderData = this.projRelations.map((r) => {
            const a = this._nodeRect(r.from);
            const b = this._nodeRect(r.to);
            if (!a || !b) return null;
            const fromEntity = entityById.get(r.from);
            const probRaw    = fromEntity && (Number.isFinite(fromEntity.root_cause_probability)
              ? fromEntity.root_cause_probability
              : null);
            const priorityCls =
              r.id === "r8"                 ? "golden-ref reference" :
              execEdges.has(r.id)           ? "exec" :
              branchEdges.has(r.id)         ? "branch" :
              primarySpineEdges.has(r.id)   ? "primary-spine spine" :
              spineEdges.has(r.id)          ? "spine" : "";
            const visualCls = branchEdges.has(r.id) ? "simulation" : (EDGE_STYLE[r.type]?.cls || "causal");
            const probEdge  = (fromEntity?.projectionRole === "cause" && probRaw !== null);
            let probWidth = null, probOpacity = null, probLabel = null;
            if (probEdge) {
              if (probRaw > 0.5)       { probWidth = 3.0; probOpacity = 0.96; }
              else if (probRaw >= 0.25) { probWidth = 2.2; probOpacity = 0.84; }
              else                      { probWidth = 1.4; probOpacity = 0.68; }
              probLabel = `${Math.round(probRaw * 100)}%`;
            }
            return { r, d: this._edgePath(a, b), lx: (a.cx + b.cx) / 2, ly: (a.cy + b.cy) / 2, priorityCls, visualCls, probEdge, probWidth, probOpacity, probLabel };
          }).filter(Boolean);

          const sel = this.edgeLayer.selectAll("path.edge").data(renderData, (d) => d.r.id);
          sel.enter()
            .append("path")
            .attr("class", (d) => `edge ${d.visualCls} ${d.priorityCls}`)
            .attr("marker-end", (d) => `url(#${EDGE_STYLE[d.r.type]?.marker || "arrow-causal"})`)
            .on("mouseenter", (event, d) => {
              d3.select(event.currentTarget).classed("focused", true);
              this.edgeLayer.selectAll("text.edge-label").classed("focused", (x) => x.r.id === d.r.id);
            })
            .on("mouseleave", (event) => {
              d3.select(event.currentTarget).classed("focused", false);
              this.edgeLayer.selectAll("text.edge-label").classed("focused", false);
            })
            .merge(sel)
            .attr("class", (d) => `edge ${d.visualCls} ${d.priorityCls}`)
            .style("stroke-width", (d) => d.probEdge ? `${d.probWidth}px` : null)
            .style("opacity",      (d) => d.probEdge ? d.probOpacity : null)
            .attr("d", (d) => d.d);
          sel.exit().remove();

          const lsel = this.edgeLayer.selectAll("text.edge-label").data(renderData, (d) => `lbl-${d.r.id}`);
          lsel.enter().append("text").attr("class", "edge-label")
            .merge(lsel)
            .attr("x", (d) => d.lx).attr("y", (d) => d.ly - 6)
            .attr("text-anchor", "middle")
            .text((d) => d.r.type.replace("_", " "));
          lsel.exit().remove();

          const probLabels = renderData.filter((d) => d.probEdge && d.probLabel);
          const pl = this.edgeLayer.selectAll("text.edge-prob-label").data(probLabels, (d) => `pl-${d.r.id}`);
          pl.enter().append("text").attr("class", "edge-prob-label")
            .merge(pl)
            .attr("x", (d) => d.lx + 12).attr("y", (d) => d.ly - 10)
            .text((d) => d.probLabel);
          pl.exit().remove();

          const current   = this._nodeRect("batch_current");
          const unchanged = this._nodeRect("sim_unchanged");
          const corrected = this._nodeRect("sim_corrected");
          const forkData  = (current && unchanged && corrected) ? [{
            x: current.x + current.w * 0.88,  y: current.y + current.h * 0.66,
            u: { x: unchanged.x + unchanged.w * 0.14, y: unchanged.y + unchanged.h * 0.14 },
            c: { x: corrected.x + corrected.w * 0.14, y: corrected.y + corrected.h * 0.14 }
          }] : [];

          const jsel = this.edgeLayer.selectAll("circle.fork-junction").data(forkData);
          jsel.enter().append("circle").attr("class","fork-junction").attr("r",3.5)
            .merge(jsel).attr("cx",(d)=>d.x).attr("cy",(d)=>d.y);
          jsel.exit().remove();

          const fpaths = [
            ...forkData.map((d) => ({ id:"u", cls:"unchanged", x1:d.x, y1:d.y, x2:d.u.x, y2:d.u.y })),
            ...forkData.map((d) => ({ id:"c", cls:"corrected",  x1:d.x, y1:d.y, x2:d.c.x, y2:d.c.y }))
          ];
          const pf = this.edgeLayer.selectAll("path.fork-link").data(fpaths, (d) => d.id);
          pf.enter().append("path").attr("class",(d)=>`simulation branch fork-link ${d.cls}`)
            .merge(pf).attr("class",(d)=>`simulation branch fork-link ${d.cls}`)
            .attr("d",(d)=>`M ${d.x1} ${d.y1} C ${(d.x1+d.x2)/2} ${d.y1}, ${(d.x1+d.x2)/2} ${d.y2}, ${d.x2} ${d.y2}`);
          pf.exit().remove();

          const flabels = [
            ...forkData.map((d) => ({ id:"lu", x:(d.x+d.u.x)/2-18, y:(d.y+d.u.y)/2-6, t:"unchanged" })),
            ...forkData.map((d) => ({ id:"lc", x:(d.x+d.c.x)/2+4,  y:(d.y+d.c.y)/2-6, t:"corrected" }))
          ];
          const ft = this.edgeLayer.selectAll("text.fork-label").data(flabels, (d) => d.id);
          ft.enter().append("text").attr("class",(d)=>`fork-label ${d.t}`)
            .merge(ft).attr("class",(d)=>`fork-label ${d.t}`)
            .attr("x",(d)=>d.x).attr("y",(d)=>d.y).text((d)=>d.t);
          ft.exit().remove();
        }

        destroyCharts() {
          Object.values(this.chartInstances).forEach((c) => { try { c.destroy(); } catch (_) {} });
          this.chartInstances = {};

        chartPluginDeviationMarker(markerIndex) {
          return {
            id: `dev-marker-${markerIndex}`,
            afterDatasetsDraw(chart) {
              const { ctx, chartArea, scales } = chart || {};
              if (!ctx || !chartArea || !scales || !scales.x || !scales.y) return;
              const x = scales.x.getPixelForValue(markerIndex);
              if (!Number.isFinite(x)) return;
              ctx.save();
              const dark = document.body.classList.contains("dark");
              ctx.strokeStyle = dark ? "#ff6b6b" : "#DC2626";
              ctx.setLineDash([4, 3]);
              ctx.lineWidth = 1.2;
              ctx.beginPath();
              ctx.moveTo(x, chartArea.top + 2);
              ctx.lineTo(x, chartArea.bottom);
              ctx.stroke();
              ctx.restore();
            }
          };
        }

        chartPluginCurrentMarker(datasetIndex) {
          return {
            id: `current-dot-${datasetIndex}`,
            afterDatasetsDraw(chart) {
              if (!chart || !chart.scales || !chart.scales.x || !chart.scales.y) return;
              const ds = chart.data.datasets[datasetIndex];
              if (!ds || !ds.data || !ds.data.length) return;
              let lastIdx = -1;
              for (let i = ds.data.length - 1; i >= 0; i -= 1) {
                const v = ds.data[i];
                if (v !== null && v !== undefined && Number.isFinite(v)) { lastIdx = i; break; }
              }
              if (lastIdx < 0) return;
              const x = chart.scales.x.getPixelForValue(lastIdx);
              const y = chart.scales.y.getPixelForValue(ds.data[lastIdx]);
              if (!Number.isFinite(x) || !Number.isFinite(y)) return;
              const { ctx } = chart;
              if (!ctx) return;
              ctx.save();
              const dark = document.body.classList.contains("dark");
              ctx.fillStyle = dark ? "#6a93ff" : "#2F6BFF";
              ctx.beginPath();
              ctx.arc(x, y, 3, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
          };
        }

        renderZoneSwimlanes() {
          const layer = document.getElementById("swimlaneLayer");
          if (!layer) return;

          const ZONE_MAP   = this.projection.zoneMap;
          const PAD_X = 48, PAD_Y = 72;
          const GAP   = 32; // minimum gap between adjacent bands

          // 1. Collect node bounds per zone
          const rawBounds = {};
          this.subgraph.entities.forEach((e) => {
            const zone = ZONE_MAP[e.id];
            if (!zone) return;
            const el = this.nodeLayer.querySelector(`[data-id="${e.id}"]`);
            const p  = this.uiState.positions[e.id];
            if (!el || !p) return;
            const w = el.offsetWidth  || 0;
            const h = el.offsetHeight || 0;
            if (!rawBounds[zone]) {
              rawBounds[zone] = { minX: p.x, maxX: p.x + w, minY: p.y, maxY: p.y + h };
            } else {
              rawBounds[zone].minX = Math.min(rawBounds[zone].minX, p.x);
              rawBounds[zone].maxX = Math.max(rawBounds[zone].maxX, p.x + w);
              rawBounds[zone].minY = Math.min(rawBounds[zone].minY, p.y);
              rawBounds[zone].maxY = Math.max(rawBounds[zone].maxY, p.y + h);
            }
          });

          if (!Object.keys(rawBounds).length) { layer.innerHTML = ""; return; }

          // 2. Build sorted list of bands with padded left/right
          const bands = Object.entries(rawBounds)
            .map(([zone, b]) => ({ zone, left: b.minX - PAD_X, right: b.maxX + PAD_X, minY: b.minY, maxY: b.maxY }))
            .sort((a, b) => a.left - b.left);

          // 3. Resolve overlaps: for each adjacent pair that overlaps, split the overlap at the midpoint
          for (let i = 0; i < bands.length - 1; i++) {
            const a = bands[i], b = bands[i + 1];
            if (a.right + GAP > b.left) {
              const mid = (a.right + b.left) / 2;
              a.right = mid - GAP / 2;
              b.left  = mid + GAP / 2;
            }
          }

          // 4. Shared Y span
          let globalMinY = Infinity, globalMaxY = -Infinity;
          bands.forEach((b) => {
            globalMinY = Math.min(globalMinY, b.minY);
            globalMaxY = Math.max(globalMaxY, b.maxY);
          });
          const topY   = globalMinY - PAD_Y;
          const totalH = (globalMaxY + PAD_Y) - topY;

          const ZONE_LABELS = { A:"Reference", B:"Root Causes", C:"Live Process", D:"Analytics", E:"Decision", F:"Execution" };
          const k = (this.uiState.transform || d3.zoomIdentity).k || 1;
          const labelSize = Math.round(Math.min(22, Math.max(11, 14 / k)));

          layer.innerHTML = bands.map(({ zone, left, right }) => {
            const width = Math.max(0, right - left);
            const label = ZONE_LABELS[zone] || zone;
            return `<div class="swimlane zone-${zone}" style="left:${left}px;width:${width}px;top:${topY}px;height:${totalH}px;"><span class="swimlane-label" style="font-size:${labelSize}px;">${label}</span></div>`;
          }).join("");
        }

            const breach1h = [null,null,null,null,null,null,null,null,null,null,null,16.1,14.9,13.7,12.5,11.4,10.4,9.6,8.9,8.4,8.0,7.7,7.5,7.4];
            const stable24 = Array.from({length:24},(_,i)=>22.2+(i%3===0?0.1:i%3===1?-0.1:0));
            bindRangeButtons("quality_seal", this.chartInstances.quality_seal, {
              "30m": { labels: labels30m, datasets: [gold1h.slice(-15), live1h.slice(-15), upper1h.slice(-15), lower1h.slice(-15), breach1h.slice(-15)] },
              "1h":  { labels,            datasets: [gold1h, live1h, upper1h, lower1h, breach1h] },
              "4h":  { labels: labels4h,  datasets: [[...stable24,...gold1h],[...stable24,...live1h],Array(48).fill(22.5),Array(48).fill(16.2),[...Array(35).fill(null),...breach1h.slice(11)]] }
            });
          }

          if (this.chartInstances.impact_loss) {
            const correctedActive = this.uiState.simulation.corrected;
            const gold1h = Array(24).fill(2.1);
            const loss1h = [5,5.6,6.4,7.5,9.0,10.8,13.0,15.5,18.2,21.1,24.0,26.8,29.4,31.7,33.7,35.5,37.0,38.3,39.4,40.3,41.1,41.8,42.4,42.8];
            const corr1h = correctedActive ? [5,5.2,5.4,5.7,6.1,6.5,7.0,7.5,8.1,8.7,9.3,9.9,10.5,11.1,11.7,12.3,12.9,13.5,14.1,14.7,15.2,15.7,16.2,16.6] : [];
            const flat24 = Array.from({length:24},(_,i)=>2.1+(i%4===0?0.1:0));
            bindRangeButtons("impact_loss", this.chartInstances.impact_loss, {
              "30m": { labels: labels30m, datasets: [gold1h.slice(-15), loss1h.slice(-15), correctedActive ? corr1h.slice(-15) : []] },
              "1h":  { labels,            datasets: [gold1h, loss1h, corr1h] },
              "4h":  { labels: labels4h,  datasets: [Array(48).fill(2.1), [...flat24,...loss1h], correctedActive ? [...flat24,...corr1h] : []] }
            });
          }

          const tensionCanvas = document.getElementById("chart-sensor_tension");
          if (tensionCanvas) {
            this.chartInstances.sensor_tension = new ChartJS(tensionCanvas.getContext("2d"), {
              type: "line",
              data: {
                labels,
                datasets: [
                  { label:"Normal band", data:Array(24).fill(100), borderColor:theme.gold, borderDash:[5,4], borderWidth:1.6, fill:false, pointRadius:0 },
                  { label:"Tension %", data:[100,100,100.2,100.1,100,100.2,100.3,100.4,100.6,100.8,101.2,101.7,102.2,102.8,103.4,104.0,104.7,105.4,106.0,106.6,107.1,107.4,107.7,107.8], borderColor:theme.loss, backgroundColor:theme.fillRed, borderWidth:2.4, fill:"1", pointRadius:0 }
                ]
              },
              options: this.baseChartOptions(98, 110, true, "%")
            });
          }

          const heaterCanvas = document.getElementById("chart-control_heater");
          if (heaterCanvas) {
            this.chartInstances.control_heater = new ChartJS(heaterCanvas.getContext("2d"), {
              type: "line",
              data: {
                labels,
                datasets: [
                  { label:"Setpoint 183°C", data:Array(24).fill(183), borderColor:theme.gold, borderDash:[5,4], borderWidth:1.6, fill:false, pointRadius:0 },
                  { label:"Actual °C", data:[183,183,183.1,183.1,183.2,183.3,183.4,183.5,183.6,183.8,184.0,184.2,184.5,184.7,184.9,185.0,185.1,185.2,185.2,185.2,185.2,185.2,185.2,185.2], borderColor:"#f97316", backgroundColor:"rgba(249,115,22,0.12)", borderWidth:2.4, fill:"1", pointRadius:0 }
                ]
              },
              options: this.baseChartOptions(181, 187, true, "°C")
            });
          }

          const foilCanvas = document.getElementById("chart-material_foil");
          if (foilCanvas) {
            this.chartInstances.material_foil = new ChartJS(foilCanvas.getContext("2d"), {
              type: "line",
              data: {
                labels,
                datasets: [
                  { label:"Expected", data:Array(24).fill(100), borderColor:theme.gold, borderDash:[5,4], borderWidth:1.6, fill:false, pointRadius:0 },
                  { label:"Foil tension %", data:[100,100.1,100,100.2,100.3,100.4,100.6,100.9,101.2,101.7,102.2,102.8,103.4,104.0,104.6,105.1,105.6,106.0,106.4,106.7,107.0,107.2,107.4,107.6], borderColor:theme.live, backgroundColor:theme.fillBlue, borderWidth:2.2, fill:"1", pointRadius:0 }
                ]
              },
              options: this.baseChartOptions(98, 110, true, "%")
            });
          }
        }

        _resizeCharts() {
          Object.values(this.chartInstances).forEach((c) => {
            try { if (c && c.canvas && c.canvas.isConnected) c.resize(); } catch (_) {}
          });
        }

        _tickCharts() {
          const batchChart = this.chartInstances.batch_current;
          if (batchChart && batchChart.canvas && batchChart.canvas.isConnected && batchChart.data?.datasets?.[1]?.data) {
            const ds   = batchChart.data.datasets[1].data;
            const next = Math.max(18, Math.min(31, ds[ds.length - 1] + (Math.random() - 0.30) * 0.55));
            ds.push(Number(next.toFixed(2)));
            ds.shift();
            try { batchChart.update("none"); } catch (_) {}
          }
          const qualityChart = this.chartInstances.quality_seal;
          if (qualityChart && qualityChart.canvas && qualityChart.canvas.isConnected && qualityChart.data?.datasets?.[0]?.data) {
            const q     = qualityChart.data.datasets[0].data;
            const nextQ = Math.max(4, Math.min(24, q[q.length - 1] + (Math.random() - 0.68) * 0.52));
            q.push(Number(nextQ.toFixed(2)));
            q.shift();
            const breach = q.map((v) => (v !== null && (v < 16.2 || v > 22.5) ? v : null));
            if (qualityChart.data.datasets[3]) qualityChart.data.datasets[3].data = breach;
            try { qualityChart.update("none"); } catch (_) {}
          }
        }

        // ── Event bindings ────────────────────────────────────────────

        _bindActionEvents() {
          if (!this.actionsBar) return;
          const focusMap = {
            reduce_speed: "batch_current",
            adjust_heater:"control_heater",
            log_mes:      "deviation",
            notify_qa:    "deviation",
            update_erp:   "impact_loss"
          };
          this.actionsBar.querySelectorAll(".action-btn").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              const action = btn.getAttribute("data-action");
              const root   = focusMap[action] || "deviation";
              this.enterFocusMode(root);
              btn.classList.add("active");
              if (!btn.dataset.confirming) {
                btn.dataset.confirming = "1";
                btn.classList.add("queued");
                setTimeout(() => {
                  btn.classList.remove("queued");
                  delete btn.dataset.confirming;
                }, 1800);
              }
            });
          });
        }

        _bindFocusExit() {
          if (this.focusExit) {
            this.focusExit.addEventListener("click", (e) => {
              e.stopPropagation();
              this.exitFocusMode();
            });
          }
          window.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && this.uiState.actionMode && !this.dragging) this.exitFocusMode();
          });
        }

        _bindHotkeys() {
          window.addEventListener("keydown", (e) => {
            if (e.metaKey || e.ctrlKey) {
              if (e.key.toLowerCase() === "k") {
                e.preventDefault();
                this._openCommandSurface();
              }
              return;
            }
            if (/^[1-5]$/.test(e.key)) {
              const idx = Number(e.key) - 1;
              const btn = this.actionsBar?.querySelectorAll(".action-btn")?.[idx];
              if (btn) btn.click();
            }
            if (e.key.toLowerCase() === "f") {
              if (this.uiState.actionMode) this.exitFocusMode();
              else this.enterFocusMode("deviation");
            }
          });
        }

        _bindCommandSurface() {
          if (!this.commandBtn || !this.commandMenu || !this.commandInput || !this.commandList) return;
          const commands = [
            "show drift path","isolate root cause","show affected systems",
            "compare to golden batch","simulate correction","explain deviation"
          ];
          const renderList = (q = "") => {
            const pool     = [...this.commandHistory.slice(-3).reverse(), ...commands];
            const uniq     = Array.from(new Set(pool));
            const filtered = uniq.filter((c) => c.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
            this.commandList.innerHTML = filtered.map((c) => `<button class="command-item" data-cmd="${c}">${c}</button>`).join("");
            this.commandList.querySelectorAll(".command-item").forEach((el) => {
              el.addEventListener("click", () => {
                this._executeGraphCommand(el.getAttribute("data-cmd") || "");
                this._closeCommandSurface();
              });
            });
          };
          this.commandBtn.addEventListener("click", () => this._openCommandSurface());
          this.commandInput.addEventListener("input", () => renderList(this.commandInput.value));
          this.commandInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              const cmd = this.commandInput.value.trim();
              if (cmd) { this._executeGraphCommand(cmd); this._closeCommandSurface(); }
            }
          });
          document.addEventListener("click", (e) => {
            if (!this.commandMenu.classList.contains("show")) return;
            if (e.target.closest("#commandMenu") || e.target.closest("#commandBtn")) return;
            this._closeCommandSurface();
          });
          this._renderCommandList = renderList;
        }

        _bindTimelineEvents() {
          const timeline = document.getElementById("timeline");
          if (!timeline) return;
          timeline.querySelectorAll(".event").forEach((el) => {
            el.addEventListener("click", () => {
              const ids = (el.getAttribute("data-focus") || "").split(",").map((s) => s.trim()).filter(Boolean);
              if (!ids.length) return this.enterFocusMode("deviation");
              this.enterFocusMode(ids[0], { seedIds: ids.slice(1) });
            });
          });
        }

        _openCommandSurface() {
          if (!this.commandMenu) return;
          this.commandMenu.classList.add("show");
          this._renderCommandList?.("");
          requestAnimationFrame(() => this.commandInput?.focus());
        }

        _closeCommandSurface() {
          if (!this.commandMenu) return;
          this.commandMenu.classList.remove("show");
          if (this.commandInput) this.commandInput.value = "";
        }

        _executeGraphCommand(cmdRaw) {
          const cmd = cmdRaw.toLowerCase().trim();
          if (!cmd) return;
          this.commandHistory.push(cmdRaw);
          if (cmd.includes("drift path"))         return this.enterFocusMode("sensor_tension", { seedIds: ["material_foil","control_heater","asset_sealer","deviation"] });
          if (cmd.includes("root cause"))          return this.enterFocusMode("sensor_tension", { seedIds: ["material_foil","control_heater"] });
          if (cmd.includes("affected systems"))    return this.enterFocusMode("impact_loss",    { seedIds: ["sys_mes","sys_qa","sys_erp"] });
          if (cmd.includes("golden"))              return this.enterFocusMode("batch_golden",   { seedIds: ["batch_current"] });
          if (cmd.includes("simulate correction")) return this.enterFocusMode("sim_corrected",  { seedIds: ["impact_loss","batch_current"] });
          if (cmd.includes("explain deviation"))   return this.enterFocusMode("deviation",      { seedIds: ["asset_sealer","quality_seal"] });
          this.enterFocusMode("deviation");
        }
      } // end Renderer

      // ─────────────────────────────────────────────────────────────────
      // Utility functions
      // ─────────────────────────────────────────────────────────────────
      function startClock() {
        const clock = document.getElementById("clock");
        const tick  = () => { clock.textContent = new Date().toLocaleTimeString([], { hour12: false }); };
        tick();
        setInterval(tick, 1000);
      }

      function initThemeToggle(renderer) {
        const btn  = document.getElementById("themeToggle");
        if (!btn) return;
        const saved  = localStorage.getItem(THEME_KEY);
        const isDark = saved === "dark";
        document.body.classList.toggle("dark", isDark);
        btn.dataset.mode = isDark ? "Night" : "Day";
        btn.addEventListener("click", () => {
          const nextDark = !document.body.classList.contains("dark");
          document.body.classList.toggle("dark", nextDark);
          localStorage.setItem(THEME_KEY, nextDark ? "dark" : "light");
          btn.dataset.mode = nextDark ? "Night" : "Day";
          renderer.scheduleRender();
        });
      }

      function initSimToggle(uiState, renderer) {
        const btn = document.getElementById("simToggle");
        if (!btn) return;
        const update = () => { btn.dataset.mode = uiState.simulation.corrected ? "Corrected" : "Unchanged"; };
        update();
        btn.addEventListener("click", () => {
          uiState.simulation.corrected = !uiState.simulation.corrected;
          update();
          renderer.scheduleRender();
        });
      }

      function initDensityToggle(renderer) {
        const btn  = document.getElementById("densityToggle");
        if (!btn) return;
        const saved   = localStorage.getItem(DENSITY_KEY);
        const compact = saved === "compact";
        document.body.classList.toggle("compact", compact);
        btn.dataset.mode = compact ? "Compact" : "Expanded";
        btn.addEventListener("click", () => {
          const nextCompact = !document.body.classList.contains("compact");
          document.body.classList.toggle("compact", nextCompact);
          localStorage.setItem(DENSITY_KEY, nextCompact ? "compact" : "expanded");
          btn.dataset.mode = nextCompact ? "Compact" : "Expanded";
          renderer?.scheduleRender();
          requestAnimationFrame(() => renderer?.fitToScene(false));
        });
      }

      // ─────────────────────────────────────────────────────────────────
      // Boot sequence
      // ─────────────────────────────────────────────────────────────────
      function boot() {
        startClock();
        if (!window.Chart) {
          console.error("Chart.js failed to load. Verify chart.umd.min.js is reachable.");
        }

        const pkg        = new PlantKnowledgeGraph();
        seedGraph(pkg);

        const liveSignal = new LiveSignalModel(pkg);
        const incident   = new IncidentEngine(pkg);
        const decision   = new DecisionEngine(pkg, incident, liveSignal);
        const projection = new WhiteboardProjectionEngine(pkg, ZONE_MAP);
        const uiState    = new UIState();
        const renderer   = new Renderer(pkg, liveSignal, incident, decision, projection, uiState);

        initThemeToggle(renderer);
        initDensityToggle(renderer);
        initSimToggle(uiState, renderer);

        renderer.boot();
      }

      boot();
    })();
  </script>
</body>
