<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KairOS Dynamic Plant Graph</title>
  <style>
    :root {
      --bg: #F6F7F4;
      --panel: rgba(250,251,248,0.72);
      --card: #FCFCFA;

      --text-primary: #161B22;
      --text-secondary: #4B5563;
      --text-muted: #6B7280;

      --border-soft: rgba(60,72,88,0.10);
      --border-default: rgba(60,72,88,0.16);

      --focus: #355C9A;
      --focus-ring: rgba(53,92,154,0.18);

      --material:   #4B6A9B;
      --sensor:     #2E6F74;
      --control:    #587A3E;
      --asset:      #355C9A;
      --quality:    #A47A2A;
      --golden:     #9B7A2E;
      --deviation:  #B14A42;
      --simulation: #7A5CAD;
      --financial:  #6D7C46;
      --system:     #727C8A;

      --material-fill:   #F2F5FA;
      --sensor-fill:     #F1F6F5;
      --control-fill:    #F4F7F1;
      --asset-fill:      #F2F5FA;
      --quality-fill:    #FBF7EE;
      --golden-fill:     #F9F3E6;
      --deviation-fill:  #FCF1EF;
      --simulation-fill: #F5F2FA;
      --financial-fill:  #F4F7F0;
      --system-fill:     #F6F7F8;

      --chart-live:       #355C9A;
      --chart-reference:  #9B7A2E;
      --chart-threshold:  #6B7280;
      --chart-loss:       #B14A42;
      --chart-recovery:   #587A3E;
      --chart-simulation: #7A5CAD;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-size: 16px;
      overflow: hidden;
      background: var(--bg);
      color: #1e293b;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 64px 42px 40px 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: rgba(248,249,245,0.74);
      backdrop-filter: blur(8px) saturate(105%);
      -webkit-backdrop-filter: blur(8px) saturate(105%);
      border-bottom: 1px solid rgba(60,72,88,0.08);
      z-index: 20;
    }

    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mark {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid rgba(53,92,154,0.55);
      background: linear-gradient(135deg, #E4EAF5 0%, #D0DAEA 100%);
    }
    .brand b { font-size: 22px; font-weight: 650; letter-spacing: 0.01em; }
    .context {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .command {
      height: 40px;
      width: min(640px, 58vw);
      border: 1px solid rgba(99, 106, 128, 0.2);
      border-radius: 999px;
      background: rgba(251, 252, 255, 0.58);
      backdrop-filter: blur(14px) saturate(125%);
      -webkit-backdrop-filter: blur(10px);
      color: #4a5163;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      font-size: 15px;
      cursor: pointer;
    }
    .command:focus-visible,
    .action-btn:focus-visible,
    .theme-toggle:focus-visible,
    .focus-exit:focus-visible,
    .insight-chip:focus-visible {
      outline: 2px solid #7aa2ff;
      outline-offset: 2px;
    }

    .command-menu {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, 72vw);
      border: 1px solid rgba(99, 106, 128, 0.18);
      border-radius: 14px;
      background: rgba(247, 248, 253, 0.76);
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
      padding: 10px;
      display: none;
      z-index: 40;
    }
    .command-menu.show { display: block; }
    .command-menu input {
      width: 100%;
      height: 40px;
      border: 1px solid rgba(99, 106, 128, 0.18);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      background: rgba(255,255,255,0.62);
      color: #1e293b;
    }
    .command-list {
      margin-top: 8px;
      display: grid;
      gap: 6px;
      max-height: 220px;
      overflow: auto;
    }
    .command-item {
      border: 1px solid rgba(99, 106, 128, 0.18);
      border-radius: 10px;
      background: rgba(251,252,255,0.58);
      color: #3b4253;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
    }

    .status { justify-self: end; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #44536e; }
    .live {
      border: 1px solid rgba(53,92,154,0.24);
      border-radius: 6px;
      padding: 4px 10px;
      background: rgba(53,92,154,0.07);
      color: #355C9A;
      font-weight: 600;
      font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .live i { width: 6px; height: 6px; border-radius: 50%; background: #587A3E; display: inline-block;
      box-shadow: 0 0 0 3px rgba(88,122,62,0.20); }

    .board {
      position: relative;
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(circle at 1px 1px, rgba(80,96,120,0.32) 1px, transparent 1.2px) 0 0 / 40px 40px,
        radial-gradient(circle at 1px 1px, rgba(80,96,120,0.12) 1px, transparent 1.2px) 20px 20px / 40px 40px,
        #F6F7F4;
    }
    /* ── Zone Swimlanes ──────────────────────────────────────── */
    #swimlaneLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .swimlane {
      position: absolute;
      border-radius: 16px;
      pointer-events: none;
    }
    .swimlane-label {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 800;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.70;
      pointer-events: none;
      line-height: 1;
      color: var(--text-primary);
    }
    /* Zone fills — structural, cards and edges are primary */
    .zone-A { background: rgba(155,122,46,0.04);  border: 1px solid rgba(155,122,46,0.14);  color: #7A5C20; }
    .zone-B { background: rgba(177,74,66,0.04);   border: 1px solid rgba(177,74,66,0.14);   color: #8C3B35; }
    .zone-C { background: rgba(53,92,154,0.04);   border: 1px solid rgba(53,92,154,0.14);   color: #2F4F7C; }
    .zone-D { background: rgba(164,122,42,0.04);  border: 1px solid rgba(164,122,42,0.14);  color: #7A5820; }
    .zone-E { background: rgba(88,122,62,0.04);   border: 1px solid rgba(88,122,62,0.14);   color: #445E2E; }
    .zone-F { background: rgba(114,124,138,0.04); border: 1px solid rgba(114,124,138,0.13); color: #4A5568; }


    .timeline {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid rgba(60,72,88,0.08);
      background: rgba(248,249,245,0.74);
      backdrop-filter: blur(8px) saturate(105%);
      -webkit-backdrop-filter: blur(8px) saturate(105%);
      overflow-x: auto;
      white-space: nowrap;
      z-index: 15;
    }
    .timeline .event {
      border: 1px solid rgba(99, 106, 128, 0.16);
      border-radius: 999px;
      background: rgba(251,252,255,0.52);
      color: #454d5f;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .timeline .event b {
      color: #24364f;
      margin-right: 6px;
      font-weight: 700;
    }

    #viewport {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
    }

    #edgeSvg, #nodeLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 2;
    }

    #edgeSvg { pointer-events: none; z-index: 1; }

    .node {
      position: absolute; border-radius: 10px;
      border: 1px solid var(--border-default);
      border-left: 4px solid var(--accent);
      background: var(--card);
      box-shadow: 0 1px 3px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.08);
      padding: 22px 26px; font-size: 14px; line-height: 1.55;
      color: var(--text-primary); cursor: grab; user-select: none; touch-action: none;
      overflow: hidden; min-width: 340px;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    /* Node type fills — light mode */
    .node.material   { background: var(--material-fill);   border-left-color: var(--material); }
    .node.sensor     { background: var(--sensor-fill);     border-left-color: var(--sensor); }
    .node.control    { background: var(--control-fill);    border-left-color: var(--control); }
    .node.controlparameter { background: var(--control-fill); border-left-color: var(--control); }
    .node.asset      { background: var(--asset-fill);      border-left-color: var(--asset); }
    .node.quality    { background: var(--quality-fill);    border-left-color: var(--quality); }
    .node.qualitystate { background: var(--quality-fill);  border-left-color: var(--quality); }
    .node.goldenbatch { background: var(--golden-fill);   border-left-color: var(--golden); box-shadow: 0 1px 3px rgba(161,98,7,0.10), 0 4px 20px rgba(161,98,7,0.14); }
    .node.batch      { background: var(--asset-fill);      border-left-color: var(--asset); }
    .node.deviation  { background: var(--deviation-fill);  border-left-color: var(--deviation); }
    .node.simulation { background: var(--simulation-fill); border-left-color: var(--simulation); }
    .node.simulationscenario { background: var(--simulation-fill); border-left-color: var(--simulation); }
    .node.financial  { background: var(--financial-fill);  border-left-color: var(--financial); }
    .node.financialimpact { background: var(--financial-fill); border-left-color: var(--financial); }
    .node.system     { background: var(--system-fill);     border-left-color: var(--system); }
    .node.externalsystem { background: var(--system-fill); border-left-color: var(--system); }
    .node.action     { background: var(--control-fill);    border-left-color: var(--control); }
    .node.dragging { cursor: grabbing; }
    .node:hover {
      box-shadow:
        0 20px 42px rgba(30, 27, 32, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .node:active {
      cursor: grabbing;
      transform: scale(1.02);
    }

    .node::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 12px 0 0 12px;
      background: var(--accent, #0a84ff);
      opacity: 0.9;
    }

    .node::after {
      content: none;
    }

    .anchor-card   { min-width: 520px; }
    .process-card  { min-width: 400px; }
    .simulation-card {
      min-width: 300px !important;
      max-width: 340px !important;
      padding: 18px 20px !important;
      border-style: solid;
    }
    .system-card   { min-width: 280px; padding: 16px 20px; }
    .compact-card  { min-width: 320px; }
    .system-card .spark { display: none; }
    .system-card .metrics { gap: 5px; margin-bottom: 0; }
    .system-card .metric { font-size: 12px; }
    .system-card .metric b { font-size: 14px; }

    .tier-primary {
      border-color: #b2c6de;
      box-shadow: 0 28px 56px rgba(15, 23, 42, 0.22), inset 0 1px 0 rgba(255,255,255,0.82);
    }
    .tier-secondary {
      border-color: #cfdae8;
      box-shadow: 0 14px 26px rgba(15, 23, 42, 0.11), inset 0 1px 0 rgba(255,255,255,0.68);
    }
    .tier-tertiary {
      border-color: #dde5ee;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05), inset 0 1px 0 rgba(255,255,255,0.58);
      opacity: 0.78;
    }
    .tier-endpoint {
      border-color: #e0e7f0;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04), inset 0 1px 0 rgba(255,255,255,0.56);
      opacity: 0.72;
    }
    .operational-card .insight-chip { opacity: 0.92; }
    .analytical-card .insight-chip {
      border-color: #ccdaf7;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.7),
        0 5px 14px rgba(21, 43, 82, 0.12);
    }
    .analytical-card .spark { border-top-color: #d5e0f2; }
    .endpoint-card .sub { font-size: 12px; }
    .endpoint-card .metrics { margin-bottom: 0; gap: 5px; }
    .endpoint-card .metric { font-size: 12px; }
    .endpoint-card .metric b { font-size: 14px; }

    .node-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }
    .node-header-main {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .icon-chip {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: var(--icon-bg, #edf2fb);
    }
    .icon-chip svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .node-title,
    .node .title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: #0a0e1a;
      margin-bottom: 4px;
    }

    .node .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: #8E8E93;
      margin-bottom: 8px;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: #8E8E93;
    }

    /* State badge — large touch-friendly pill */
    .node-status,
    .state {
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      min-height: 34px;
      border-radius: 999px;
      background: var(--state-bg, #F2F2F7);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      border: 1.5px solid var(--state-border, #C6C6C8);
      color: var(--state-fg, #3C3C43);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .state i { width: 8px; height: 8px; border-radius: 50%; background: currentColor; display: inline-block; flex-shrink: 0; }

    .node-body { display: flex; flex-direction: column; gap: 10px; }

    .signal-age {
      font-size: 12px;
      color: #8E8E93;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .signal-age.stale { color: #FF9F0A; font-weight: 700; }

    .sub { font-size: 15px; font-weight: 500; line-height: 1.5; color: #3C3C43; margin-bottom: 0; }

    .metrics { display: grid; gap: 10px; margin-top: 6px; margin-bottom: 16px; }
    .node .metric {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      font-size: 14px;
      font-weight: 600;
      color: #3C3C43;
      min-height: 32px;
    }
    .node .metric b {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.1;
      color: #0a0e1a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      letter-spacing: -0.02em;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      font-size: 14px;
      font-weight: 600;
      color: #3C3C43;
    }
    .metric b {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.1;
      color: #0a0e1a;
      letter-spacing: -0.02em;
    }

    .metric-probability {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #475569;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      border-top: 1px dashed rgba(100,116,139,0.22);
      padding-top: 6px;
      margin-top: 2px;
    }
    .metric-probability b {
      font-size: 16px;
      font-weight: 600;
      color: #0f172a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .simulation-card .node-title,
    .simulation-card .title {
      font-size: 15px;
      font-weight: 600;
    }

    .node.prob-high:not(.focus-root):not(.focal) { transform: scale(1.04); }
    .node.prob-medium:not(.focus-root):not(.focal) { transform: scale(1.02); }

    @keyframes kairosShimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    @keyframes kairosPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(1.35); }
    }
    .insight-chip {
      display: flex; align-items: flex-start; gap: 12px;
      background: linear-gradient(
        105deg,
        rgba(122,92,173,0.10) 0%,
        rgba(93,78,160,0.16) 35%,
        rgba(122,92,173,0.10) 55%,
        rgba(74,90,168,0.14) 80%,
        rgba(122,92,173,0.10) 100%
      );
      background-size: 300% 100%;
      animation: kairosShimmer 6s linear infinite;
      border: 1.5px solid rgba(122,92,173,0.24);
      border-left: 3px solid var(--simulation);
      border-radius: 10px;
      padding: 14px 16px; min-height: 52px;
      font-size: 14px; line-height: 1.5;
      color: #4C1D95;
      cursor: pointer; width: 100%; text-align: left; margin-top: 10px;
      transition: border-color 150ms;
    }
    .insight-chip:hover {
      border-color: rgba(122,92,173,0.40);
      animation-duration: 2.5s;
    }
    .insight-chip strong { color: var(--simulation); font-weight: 700; }
    .insight-chip i {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--simulation); flex-shrink: 0; margin-top: 6px;
      animation: kairosPulse 2.4s ease-in-out infinite;
    }

    @keyframes meiPulse {
      0% { box-shadow: 0 0 0 0 rgba(59,102,194,0.35); }
      70% { box-shadow: 0 0 0 8px rgba(59,102,194,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,102,194,0); }
    }

    .spark-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      margin-bottom: 4px;
      gap: 8px;
    }
    .spark-ref-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #b68c2d;
      opacity: 0.82;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .spark-ref-label::before {
      content: "";
      display: inline-block;
      width: 20px;
      height: 2px;
      background: currentColor;
      border-radius: 1px;
      opacity: 0.65;
    }
    .spark-range { display: flex; gap: 3px; }
    .spark-range-btn {
      border: 1px solid rgba(99,106,128,0.18);
      border-radius: 999px;
      background: transparent;
      color: #64748b;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      cursor: pointer;
      transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
    }
    .spark-range-btn:hover { border-color: rgba(47,107,255,0.22); color: #3b5fc0; }
    .spark-range-btn.active {
      background: rgba(47,107,255,0.10);
      border-color: rgba(47,107,255,0.30);
      color: #2f6bff;
    }

    .spark {
      margin-top: 6px;
      border-top: 1px solid #e2e8f0;
      padding-top: 12px;
      width: 100%;
      height: 160px;
      position: relative;
    }
    .spark.large { height: 220px; }

    .spark canvas { width: 100% !important; height: 100% !important; display: block; }
    .anchor-card .spark        { height: 220px; }
    .process-card .spark       { height: 160px; }
    .simulation-card .spark    { height: 150px; }
    .system-card .spark        { display: none; }
    .compact-card.expanded .spark { height: 150px; }

    .primary-analytical {
      box-shadow: 0 14px 34px rgba(15,23,42,0.12);
      border-color: #cfd9e8;
    }

    .theme-toggle {
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 10px;
      padding: 6px 10px;
      background: rgba(242, 246, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #3f5ea5;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .theme-toggle::after {
      content: attr(data-mode);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 20px;
      border-radius: 999px;
      background: rgba(63, 94, 165, 0.12);
      color: #2f4f8f;
      font-size: 10px;
      font-weight: 700;
    }

    .edge { fill: none; stroke: #94A3B8; stroke-width: 1.5px; opacity: 0.65; }
    .edge.material   { stroke: var(--material);   stroke-width: 2px;   opacity: 0.80; }
    .edge.causal     { stroke: #334155;            stroke-width: 3px;   opacity: 0.55; }
    .edge.deviation  { stroke: var(--deviation);   stroke-width: 2.5px; opacity: 0.90; }
    .edge.control    { stroke: var(--control);     stroke-width: 2px;   opacity: 0.80; }
    .edge.simulation { stroke: var(--simulation);  stroke-width: 1.5px; stroke-dasharray: 6 4; opacity: 0.75; }
    .edge.system     { stroke: var(--system);      stroke-width: 1px;   stroke-dasharray: 3 4; opacity: 0.45; }
    .edge.golden-ref { stroke: var(--golden);      stroke-width: 1.5px; stroke-dasharray: 8 5; opacity: 0.60; }
    .edge.reference  { stroke: #94A3B8;            stroke-width: 1px;   stroke-dasharray: 3 4; opacity: 0.30; }
    .edge.focused    { stroke: var(--focus) !important; opacity: 1 !important; stroke-width: 3px !important; filter: drop-shadow(0 0 4px var(--focus-ring)); }
    .edge.primary-spine  { opacity: 1; stroke-width: 3px !important; }
    .edge.spine          { opacity: 0.85; }
    .edge.branch         { opacity: 0.55; }
    .edge.exec           { opacity: 0.28; }
    .edge.dimmed { opacity: 0.05 !important; }
    .fork-link {
      fill: none;
      stroke: #0a84ff;
      stroke-width: 2px;
      stroke-dasharray: 4 4;
      opacity: 0.78;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .fork-link.unchanged { stroke: #dc2626; }
    .fork-link.corrected { stroke: #0a84ff; }
    .edge-label {
      font-size: 12px;
      font-weight: 700;
      fill: #4b5a6e;
      opacity: 0.80;
      pointer-events: none;
      transition: opacity 120ms ease;
      letter-spacing: 0.01em;
    }
    .edge-label.focused { opacity: 1; }
    .edge-prob-label {
      font-size: 11px;
      fill: #64748b;
      opacity: 0.75;
      font-weight: 700;
      letter-spacing: 0.02em;
      pointer-events: none;
    }
    .fork-label {
      font-size: 11px;
      fill: #4f46e5;
      font-weight: 700;
      opacity: 0.94;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .fork-label.unchanged { fill: #dc2626; }
    .fork-label.corrected { fill: #0a84ff; }
    .fork-junction {
      fill: #4f46e5;
      opacity: 0.72;
      pointer-events: none;
    }

    .node.focal {
      opacity: 1 !important;
      outline: 2px solid var(--focus);
      outline-offset: 2px;
      box-shadow: 0 0 0 4px var(--focus-ring), 0 8px 32px rgba(29,78,216,0.16) !important;
      z-index: 20;
    }
    .node.focus-root {
      outline: 3px solid var(--deviation);
      outline-offset: 2px;
      box-shadow: 0 0 0 6px rgba(185,28,28,0.14), 0 16px 40px rgba(185,28,28,0.18) !important;
      border-left-color: var(--deviation) !important;
      z-index: 30;
    }
    .node.incident-root {
      transform: scale(1.06);
      box-shadow:
        0 0 0 3px rgba(220,38,38,0.50),
        0 0 0 7px rgba(220,38,38,0.10),
        0 28px 56px rgba(15,23,42,0.26);
      border-color: rgba(220,38,38,0.60);
      z-index: 30;
    }
    #node-batch_golden {
      z-index: 1;
      width: 360px !important;
      min-width: 360px !important;
      max-width: 360px !important;
      background: linear-gradient(180deg, rgba(251,245,224,0.96) 0%, rgba(244,235,203,0.92) 100%) !important;
      border: 1px solid rgba(251,191,36,0.34) !important;
      border-left: 4px solid #D97706 !important;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.12) !important;
      opacity: 0.94 !important;
    }
    body:not(.dark) #node-batch_golden .title,
    body:not(.dark) #node-batch_golden .node-title { color: #3B2A0E !important; }
    .node.dimmed { opacity: 0.20 !important; filter: grayscale(0.7); pointer-events: none; }
    .reference-node {
      background: #FFFBEB !important;
      border-color: #FDE68A !important;
      border-left: 4px solid #D97706 !important;
      box-shadow: 0 1px 3px rgba(217,119,6,0.12), 0 4px 20px rgba(217,119,6,0.18) !important;
    }

    .decision-dock-label {
      position: fixed;
      bottom: 82px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      color: #8A9AB0;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
      z-index: 40;
    }

    .actions {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: auto;
      max-width: 1100px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(248,249,245,0.88);
      backdrop-filter: blur(14px) saturate(110%);
      -webkit-backdrop-filter: blur(14px) saturate(110%);
      border: 1px solid rgba(60,72,88,0.10);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      z-index: 40;
    }

    .dock-divider {
      width: 1px;
      height: 28px;
      background: rgba(60,72,88,0.14);
      flex-shrink: 0;
      margin: 0 2px;
    }
    body.compact .node { padding: 14px 16px; font-size: 12px; }
    body.compact .node .title, body.compact .node-title { font-size: 14px; }


    .compact-card .spark { display: none; }
    .compact-card .extra-detail {
      display: none;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
      color: #5f6f89;
      border-top: 1px dashed rgba(100,116,139,0.24);
      padding-top: 8px;
    }

    .compact-card.expanded .spark { display: block; }
    .compact-card.expanded .extra-detail { display: block; }

    .action-btn {
      border: 1px solid rgba(60,72,88,0.14);
      border-radius: 10px;
      background: #FCFCFA;
      color: #2A3341;
      padding: 10px 16px;
      min-height: 44px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      box-shadow: none;
      flex: 0 0 auto;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 80ms, border-color 80ms;
      display: flex; align-items: center; gap: 7px;
    }
    .action-btn:hover { background: #F4F5F1; border-color: rgba(60,72,88,0.24); }
    .action-btn:active { transform: scale(0.98); }
    .action-btn .tag {
      margin-left: auto;
      border-radius: 6px;
      background: rgba(10,20,40,0.06);
      color: #6B7280;
      padding: 2px 7px;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 750;
      flex-shrink: 0;
    }

    @media (max-width: 900px) {
      .action-btn.system { display: none; }
      .dock-divider { display: none; }
      .decision-dock-label { bottom: 78px; }
    }
    @media (max-width: 600px) {
      .action-btn .tag { display: none; }
      .actions { padding: 8px 10px; gap: 6px; }
    }

    /* Color = intent — light mode industrial */
    .action-btn.primary,
    .action-btn.primary-recommendation { background: #355C9A !important; border-color: #355C9A !important; color: #FFFFFF !important; font-weight: 700; box-shadow: none; }
    .action-btn.primary:hover,
    .action-btn.primary-recommendation:hover { background: #2C4F8A !important; }
    .action-btn.warn    { background: #A4651A !important; border-color: #A4651A !important; color: #FFFFFF !important; font-weight: 700; box-shadow: none; }
    .action-btn.warn:hover { background: #8F5615 !important; }
    .action-btn.system  { background: #FCFCFA !important; border-color: rgba(60,72,88,0.14) !important; color: #334155 !important; }
    .action-btn.dimmed  { opacity: 0.35; filter: grayscale(0.25); }
    .action-btn.active  { box-shadow: 0 0 0 2px rgba(53,92,154,0.20) inset; border-color: rgba(53,92,154,0.40); }
    .action-btn.queued  { background: #587A3E !important; border-color: #587A3E !important; color: #FFFFFF !important; }

    /* ═══════════════════════════════════════════════════
       DARK MODE — Restrained Industrial HMI Palette
       ═══════════════════════════════════════════════════ */

    body.dark {
      --bg: #0B1220;
      --panel: #0F172A;
      --card: #162033;
      --card-elevated: #1B263B;

      --text-primary: #F8FAFC;
      --text-secondary: #CBD5E1;
      --text-tertiary: #94A3B8;

      --border-soft: #223047;
      --border-default: #334155;
      --border-strong: #475569;

      --focus: #60A5FA;
      --focus-ring: rgba(96,165,250,0.22);

      /* Semantic — muted for dark */
      --material:   #7AA2FF;
      --sensor:     #2DD4BF;
      --control:    #4ADE80;
      --asset:      #60A5FA;
      --quality:    #F59E0B;
      --golden:     #FBBF24;
      --deviation:  #F87171;
      --simulation: #A78BFA;
      --financial:  #4ADE80;
      --system:     #94A3B8;

      --chart-live:       #60A5FA;
      --chart-reference:  #FBBF24;
      --chart-threshold:  #64748B;
      --chart-loss:       #F87171;
      --chart-recovery:   #4ADE80;
      --chart-simulation: #A78BFA;
    }

    /* ── Base surfaces ── */
    body.dark { background: #0B1220; color: #CBD5E1; }
    body.dark #app { background: #0B1220; }

    body.dark .topbar {
      background: rgba(11,18,32,0.97);
      border-bottom-color: #223047;
      backdrop-filter: blur(16px);
    }
    body.dark .brand b  { color: #F8FAFC; }
    body.dark .context  { color: #94A3B8; }
    body.dark .status   { color: #64748B; }

    /* ── Board ── */
    body.dark .board {
      background:
        radial-gradient(circle at 1px 1px, rgba(148,163,184,0.24) 1px, transparent 1.2px) 0 0 / 40px 40px,
        radial-gradient(circle at 1px 1px, rgba(148,163,184,0.08) 1px, transparent 1.2px) 20px 20px / 40px 40px,
        #08111F;
    }

    /* ── Swimlanes — structural scaffold ── */
    body.dark .swimlane {
      opacity: 1;
      border-radius: 0;
      border-top: none;
      border-bottom: none;
      border-left: 1px solid rgba(148,163,184,0.16);
      border-right: 1px solid rgba(148,163,184,0.16);
      box-shadow: none;
      backdrop-filter: none;
    }
    body.dark .zone-A {
      background: linear-gradient(180deg, rgba(251,191,36,0.035) 0%, rgba(251,191,36,0.015) 100%);
      border-left-color: rgba(251,191,36,0.16);
      border-right-color: rgba(251,191,36,0.16);
    }
    body.dark .zone-B {
      background: linear-gradient(180deg, rgba(45,212,191,0.035) 0%, rgba(45,212,191,0.015) 100%);
      border-left-color: rgba(45,212,191,0.15);
      border-right-color: rgba(45,212,191,0.15);
    }
    body.dark .zone-C {
      background: linear-gradient(180deg, rgba(96,165,250,0.035) 0%, rgba(96,165,250,0.015) 100%);
      border-left-color: rgba(96,165,250,0.16);
      border-right-color: rgba(96,165,250,0.16);
    }
    body.dark .zone-D {
      background: linear-gradient(180deg, rgba(245,158,11,0.035) 0%, rgba(245,158,11,0.015) 100%);
      border-left-color: rgba(245,158,11,0.16);
      border-right-color: rgba(245,158,11,0.16);
    }
    body.dark .zone-E {
      background: linear-gradient(180deg, rgba(167,139,250,0.04) 0%, rgba(167,139,250,0.018) 100%);
      border-left-color: rgba(167,139,250,0.18);
      border-right-color: rgba(167,139,250,0.18);
    }
    body.dark .zone-F {
      background: linear-gradient(180deg, rgba(148,163,184,0.03) 0%, rgba(148,163,184,0.015) 100%);
      border-left-color: rgba(148,163,184,0.14);
      border-right-color: rgba(148,163,184,0.14);
    }
    body.dark .swimlane-label {
      color: rgba(203,213,225,0.32);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── Cards / Nodes ── */
    body.dark .node {
      background: linear-gradient(180deg, #162033 0%, #182538 100%);
      border-color: #334155;
      border-left-color: var(--accent);
      color: #CBD5E1;
      box-shadow:
        0 8px 24px rgba(0,0,0,0.34),
        0 18px 40px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(8px) saturate(110%);
    }
    body.dark .node:hover {
      border-color: #475569;
      background: linear-gradient(180deg, #1B2A40 0%, #1E2F44 100%);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.40),
        0 22px 48px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* ── Simulation cards — decision fork ── */
    /* Unchanged / risk path */
    body.dark #node-sim_unchanged {
      background: linear-gradient(180deg, rgba(43,23,33,0.96) 0%, rgba(28,18,30,0.94) 100%) !important;
      border: 1px solid rgba(248,113,113,0.34) !important;
      box-shadow: 0 12px 28px rgba(0,0,0,0.30) !important;
      color: #F0C9C9 !important;
    }
    body.dark #node-sim_unchanged::before { background: #F87171 !important; width: 4px !important; }
    body.dark #node-sim_unchanged .title,
    body.dark #node-sim_unchanged .node-title,
    body.dark #node-sim_unchanged .metric b { color: #FFE8E8 !important; }
    body.dark #node-sim_unchanged .sub,
    body.dark #node-sim_unchanged .metric,
    body.dark #node-sim_unchanged .section-label { color: #F0C9C9 !important; }

    /* Corrected / recovery path */
    body.dark #node-sim_corrected {
      background: linear-gradient(180deg, rgba(20,39,33,0.96) 0%, rgba(16,29,25,0.94) 100%) !important;
      border: 1px solid rgba(74,222,128,0.34) !important;
      box-shadow: 0 12px 28px rgba(0,0,0,0.30) !important;
      color: #C7EBD2 !important;
    }
    body.dark #node-sim_corrected::before { background: #4ADE80 !important; width: 4px !important; }
    body.dark #node-sim_corrected .title,
    body.dark #node-sim_corrected .node-title,
    body.dark #node-sim_corrected .metric b { color: #E8FFF0 !important; }
    body.dark #node-sim_corrected .sub,
    body.dark #node-sim_corrected .metric,
    body.dark #node-sim_corrected .section-label { color: #C7EBD2 !important; }

    /* Simulation badge — restrained */
    body.dark .simulation-card .state,
    body.dark .simulation-card .node-status {
      background: rgba(255,255,255,0.05) !important;
      border-color: rgba(167,139,250,0.26) !important;
      color: #D8CCFF !important;
      font-size: 11px !important;
    }

    /* Golden Batch dark mode */
    body.dark #node-batch_golden {
      background: linear-gradient(180deg, rgba(53,41,16,0.88) 0%, rgba(38,31,18,0.84) 100%) !important;
      border-color: rgba(251,191,36,0.34) !important;
    }
    body.dark #node-batch_golden .title,
    body.dark #node-batch_golden .node-title { color: #F3F7FB !important; }

    /* Semantic gradient fills for key cards */
    body.dark .node[data-role="deviation"],
    body.dark .node.deviation,
    body.dark #node-deviation {
      background: linear-gradient(180deg, rgba(185,28,28,0.14) 0%, #1A1F30 100%) !important;
    }
    body.dark .node[data-role="quality"],
    body.dark .node.quality,
    body.dark #node-quality_seal {
      background: linear-gradient(180deg, rgba(180,83,9,0.10) 0%, #1A2132 100%) !important;
    }
    body.dark .node[data-role="financial"],
    body.dark .node.financial,
    body.dark #node-impact_loss {
      background: linear-gradient(180deg, rgba(22,101,52,0.12) 0%, #162234 100%) !important;
    }

    /* ── Typography ── */
    body.dark .node-title, body.dark .title      { color: #F8FAFC; }
    body.dark .sub                               { color: #A8B4C3; }
    body.dark .metric                            { color: #A8B4C3; }
    body.dark .metric b                          { color: #F8FAFC; }
    body.dark .section-label                     { color: #A8B4C3 !important; opacity: 1 !important; }
    body.dark .signal-age                        { color: #A8B4C3 !important; opacity: 1 !important; }
    body.dark .signal-age.stale                  { color: #FBBF24; }
    body.dark .di-label                          { color: #A8B4C3 !important; opacity: 1 !important; }
    body.dark .group-label                       { color: #A8B4C3 !important; opacity: 1 !important; }
    body.dark .spark-range-btn                   { color: #A8B4C3 !important; border-color: #334155; }
    body.dark .spark-range-btn.active            { background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.36); color: #60A5FA !important; }
    body.dark .spark-ref-label                   { color: #FBBF24 !important; opacity: 1 !important; }
    body.dark .edge-label                        { fill: #A8B4C3 !important; }

    /* State badges */
    body.dark .node-status, body.dark .state {
      color: #E2E8F0;
      border-color: #475569;
      background: rgba(255,255,255,0.05);
    }

    /* ── Edges ── */
    body.dark .edge             { stroke: #2D3F55; stroke-width: 1.5px; opacity: 0.65; }
    body.dark .edge.causal      { stroke: #8FA3BC; opacity: 0.44; }
    body.dark .edge.primary-spine { stroke: #C7D2E0; opacity: 0.92; stroke-width: 5px; }
    body.dark .edge.spine       { stroke: #C7D2E0; opacity: 0.70; }
    body.dark .edge.material    { stroke: #7AA2FF; stroke-width: 2px; opacity: 0.80; }
    body.dark .edge.deviation   { stroke: #F87171; stroke-width: 2.5px; opacity: 0.86; }
    body.dark .edge.control     { stroke: #4ADE80; stroke-width: 2px; opacity: 0.78; }
    body.dark .edge.simulation  { stroke: #A78BFA; stroke-width: 1.5px; opacity: 0.78; }
    body.dark .fork-link        { stroke: #A78BFA; opacity: 0.78; }
    body.dark .edge.system      { stroke: #64748B; opacity: 0.24; }
    body.dark .edge.exec        { stroke: #64748B; opacity: 0.24; }
    body.dark .edge.golden-ref  { stroke: #FBBF24; opacity: 0.34; }
    body.dark .edge.reference   { stroke: #FBBF24; opacity: 0.34; }
    body.dark .edge.branch      { opacity: 0.48; }
    body.dark .edge.focused     { stroke: #60A5FA !important; opacity: 0.96 !important; stroke-width: 3px !important; filter: none !important; }
    body.dark .fork-label           { fill: #A78BFA; opacity: 0.80; }
    body.dark .fork-label.unchanged { fill: #FCA5A5 !important; opacity: 0.95 !important; font-weight: 800 !important; }
    body.dark .fork-label.corrected { fill: #86EFAC !important; opacity: 0.95 !important; font-weight: 800 !important; }
    body.dark .fork-junction        { fill: #CBD5E1 !important; opacity: 0.42 !important; }

    /* ── Focus mode ── */
    body.dark .node.focal {
      opacity: 1 !important;
      border-color: rgba(96,165,250,0.55) !important;
      box-shadow:
        0 0 0 2px rgba(96,165,250,0.36),
        0 0 0 5px rgba(96,165,250,0.10),
        0 18px 38px rgba(0,0,0,0.42) !important;
    }
    body.dark .node.focus-root {
      border-color: #60A5FA !important;
      box-shadow:
        0 0 0 2px rgba(96,165,250,0.72),
        0 0 0 6px rgba(96,165,250,0.12),
        0 18px 38px rgba(0,0,0,0.42) !important;
    }
    body.dark .node.dimmed { opacity: 0.14 !important; filter: grayscale(0.7); pointer-events: none; }
    body.dark .node.incident-root {
      border-color: rgba(248,113,113,0.55) !important;
      box-shadow:
        0 0 0 2px rgba(248,113,113,0.40),
        0 0 0 6px rgba(248,113,113,0.10),
        0 18px 38px rgba(0,0,0,0.44) !important;
    }

    /* ── Insight chip — readable, distinct from simulation ── */
    body.dark .insight-chip {
      background: linear-gradient(
        105deg,
        rgba(96,165,250,0.08) 0%,
        rgba(122,92,173,0.14) 35%,
        rgba(96,165,250,0.08) 55%,
        rgba(122,92,173,0.12) 80%,
        rgba(96,165,250,0.08) 100%
      );
      background-size: 300% 100%;
      animation: kairosShimmer 6s linear infinite;
      border-color: rgba(96,165,250,0.22);
      border-left-color: #60A5FA;
      color: #D8E6FF;
      box-shadow: none;
    }
    body.dark .insight-chip:hover { border-color: rgba(96,165,250,0.40); animation-duration: 2.5s; }
    body.dark .insight-chip strong { color: #8CB8FF; }
    body.dark .insight-chip i { background: #60A5FA; box-shadow: none; }

    /* ── Action bar — flat, industrial, touch-friendly ── */
    body.dark .decision-dock-label { color: #475569; }
    body.dark .actions {
      background: rgba(18,28,46,0.92);
      border-color: #223047;
      box-shadow: 0 10px 30px rgba(0,0,0,0.30), 0 2px 6px rgba(0,0,0,0.18);
      backdrop-filter: blur(14px) saturate(120%);
    }
    body.dark .dock-divider { background: #223047; }
    body.dark .action-btn {
      min-height: 54px;
      padding: 0 18px;
      border-radius: 10px;
      box-shadow: none;
      background: #162033;
      border-color: #334155;
      color: #E2E8F0;

  <script>
    (() => {

      };

      const ACCENT = {
        Material:           ["#2563EB", "#EFF6FF"],
        Sensor:             ["#0891B2", "#ECFEFF"],
        ControlParameter:   ["#16A34A", "#F0FDF4"],
        Asset:              ["#1D4ED8", "#EFF6FF"],

      const STATE_STYLE = {
        normal:     ["#8A9AB0", "#F3F4F6",  "#4A5568"],   /* neutral slate — never green */

        mitigates:    { cls: "control",   marker: "arrow-control" }
      };

      // ─────────────────────────────────────────────────────────────────
      // LAYER 1 — PlantKnowledgeGraph
      // ─────────────────────────────────────────────────────────────────
      class PlantKnowledgeGraph {
        constructor() {
          this.entities  = new Map();
          this.relations = [];
          this._index    = new Map(); // id → [relation, ...]
        }
        addEntity(e) {
          this.entities.set(e.id, e);
        }
        addRelation(r) {
          this.relations.push(r);
          [r.from, r.to].forEach((id) => {
            if (!this._index.has(id)) this._index.set(id, []);
            this._index.get(id).push(r);
          });
        }
        getEntity(id)    { return this.entities.get(id); }
        getRelations(id) { return this._index.get(id) || []; }
        getRelationsFrom(id) { return this.relations.filter((r) => r.from === id); }
        getRelationsTo(id)   { return this.relations.filter((r) => r.to   === id); }
        getNeighbors(id) {
          const upstream   = this.relations.filter((r) => r.to   === id).map((r) => r.from);
          const downstream = this.relations.filter((r) => r.from === id).map((r) => r.to);
          return { upstream, downstream };
        }
      }

      function seedGraph(pkg) {
        [
          { id: "batch_golden",   type: "GoldenBatch",        label: "Golden Batch GB-2024-01",    state: "normal",     chart: "golden",  rankHint: 0, projectionRole: "reference", pinned: { x: 80, y: 70 }, root_cause_probability: null, metadata: { description: "Reference profile", detail: "Validated baseline for blister packaging line B4" }, metrics: { Yield: "98.7%", Speed: "280 ppm" }, insight: "" },

          { id: "sensor_tension", type: "Sensor",             label: "Web Tension Sensor",         state: "warning",    chart: "tension", rankHint: 1, projectionRole: "cause",     root_cause_probability: 0.62, metadata: { description: "Sensor T-44", confidence: "0.94", detail: "Signal drift persists across last 19 minutes" }, metrics: { Drift: "+7.8%", Confidence: "0.94" }, insight: "Drift detected 19 min ago" },

      // ─────────────────────────────────────────────────────────────────
      // LAYER 2 — LiveSignalModel

      class LiveSignalModel extends EventTarget {
        constructor(pkg) {
          super();
          this.pkg      = pkg;
          this._timer   = null;
          this._latest  = new Map();
          this._updatedAt = new Map();
          // Initialise timestamps for all entities
          pkg.entities.forEach((_, id) => {
            this._updatedAt.set(id, Date.now());
          });
        }
        start(intervalMs = 2400) {
          if (this._timer) return;
          this._timer = setInterval(() => this._tick(), intervalMs);
        }
        stop() {
          clearInterval(this._timer);
          this._timer = null;
        }
        getLatest(nodeId) {
          return this._latest.get(nodeId) || null;
        }
        getUpdatedAt(nodeId) {
          return this._updatedAt.get(nodeId) || 0;
        }
        _tick() {
          const liveIds = ["sensor_tension", "control_heater", "asset_sealer", "quality_seal", "batch_current", "aux_sensor_2", "aux_asset_2"];
          const now = Date.now();
          liveIds.forEach((id) => {
            this._updatedAt.set(id, now);
            this._latest.set(id, { ts: now });
          });
          this.dispatchEvent(new CustomEvent("signal", { detail: { nodeIds: liveIds, ts: now } }));
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // LAYER 3 — IncidentEngine
      // ─────────────────────────────────────────────────────────────────
      class IncidentEngine {
        constructor(pkg) {
          this.pkg = pkg;
        }

        extract(rootId, maxDepth = 3) {
          const keep = new Set([rootId]);
          const upQueue = [rootId];
          const downQueue = [rootId];

          for (let depth = 0; depth < maxDepth; depth += 1) {
            const next = [];
            upQueue.splice(0).forEach((id) => {
              this.pkg.getRelationsTo(id).forEach((r) => {
                if (!keep.has(r.from)) { keep.add(r.from); next.push(r.from); }
              });
            });
            upQueue.push(...next);
          }

          for (let depth = 0; depth < 4; depth += 1) {
            const next = [];
            downQueue.splice(0).forEach((id) => {
              this.pkg.getRelationsFrom(id).forEach((r) => {
                if (!keep.has(r.to)) { keep.add(r.to); next.push(r.to); }
              });
            });
            downQueue.push(...next);
          }

          const forced = [
            "material_foil","sensor_tension","control_heater","asset_sealer","deviation",
            "quality_seal","batch_current","batch_golden","impact_loss","sim_unchanged","sim_corrected",
            "sys_mes","sys_qa","sys_erp","aux_sensor_2","aux_asset_2"
          ];
          forced.forEach((id) => keep.add(id));

          return {
            entities: Array.from(keep).map((id) => this.pkg.getEntity(id)).filter(Boolean),
            relations: this.pkg.relations.filter((r) => keep.has(r.from) && keep.has(r.to))
          };
        }

        rankCauses(rootId) {
          const causes = [];
          const visited = new Set();
          const queue = [{ id: rootId, depth: 0 }];
          while (queue.length) {
            const { id, depth } = queue.shift();
            if (visited.has(id) || depth > 4) continue;
            visited.add(id);
            const entity = this.pkg.getEntity(id);
            if (entity && entity.projectionRole === "cause" && Number.isFinite(entity.root_cause_probability)) {
              const weight = entity.root_cause_probability / Math.max(1, depth);
              causes.push({ id, entity, probability: entity.root_cause_probability, weight, depth });
            }
            this.pkg.getRelationsTo(id).forEach((r) => {
              if (!visited.has(r.from)) queue.push({ id: r.from, depth: depth + 1 });
            });
          }
          causes.sort((a, b) => b.weight - a.weight);
          return causes;
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // LAYER 4 — DecisionEngine
      // ─────────────────────────────────────────────────────────────────
      class DecisionEngine {
        constructor(pkg, incidentEngine, liveSignal) {
          this.pkg            = pkg;
          this.incidentEngine = incidentEngine;
          this.liveSignal     = liveSignal;
        }

        compute(rootId) {
          const ranked = this.incidentEngine.rankCauses(rootId);
          const top    = ranked[0] || null;

          const dominantCause = top
            ? `${top.entity.label} — ${Math.round(top.probability * 100)}% · ${top.entity.metadata?.detail || ""}`
            : "Unknown";

          const correctedSim = this.pkg.getEntity("sim_corrected");
          const recommendation = correctedSim
            ? correctedSim.metadata?.description || "Reduce speed → 260 ppm"
            : "Reduce speed → 260 ppm";

          const lossEntity = this.pkg.getEntity("impact_loss");
          const exposure = lossEntity
            ? (lossEntity.metrics?.Unchanged || "€132K/day")
            : "€132K/day";

          const touches = ["sys_mes","sys_qa","sys_erp"]
            .map((id) => this.pkg.getEntity(id)?.label || id)
            .join(" · ");

          const confidence = top ? top.probability : 0;
          const path = ranked.map((c) => c.id);

          const status = confidence > 0.5 ? "critical" : confidence > 0.25 ? "warning" : "normal";

          return { dominantCause, recommendation, path, confidence, status, exposure, touches };
        }

        populateBanner(rootId) {
          const result = this.compute(rootId);
          const domEl  = document.getElementById("di-dominant");
          const recEl  = document.getElementById("di-recommended");
          const expEl  = document.getElementById("di-exposure");
          const touEl  = document.getElementById("di-touches");
          if (domEl) {
            const top = this.incidentEngine.rankCauses(rootId)[0];
            if (top) {
              domEl.innerHTML = `${top.entity.label} <em>${Math.round(top.probability * 100)}% · ${top.entity.metadata?.detail?.match(/\d+ min/) ? top.entity.metadata.detail.match(/\d+ min/)[0] : ""}</em>`;
            }
          }
          if (recEl) recEl.textContent = result.recommendation;
          if (expEl) expEl.textContent = result.exposure;
          if (touEl) touEl.textContent = result.touches;
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // LAYER 5 — WhiteboardProjectionEngine
      // ─────────────────────────────────────────────────────────────────
      const ZONE_MAP = {
        batch_golden:   "A",
        sensor_tension: "B",
        control_heater: "B",
        material_foil:  "B",
        batch_current:  "C",
        quality_seal:   "C",
        impact_loss:    "D",
        action_reduce:  "E",
        sys_erp:        "F",
        sys_mes:        "F",
        sys_qa:         "F"
      };

      const ZONE_X = { A: 80, B: 340, C: 820, D: 1380, E: 1700, F: 1960 };
      const ZONE_RANKSEP = 180;
      const ZONE_NODESEP = 120;

      class WhiteboardProjectionEngine {
        constructor(pkg, zoneMap) {
          this.pkg     = pkg;
          this.zoneMap = zoneMap;
        }

        layout(containerWidth, containerHeight, subgraphEntities, subgraphRelations) {
          const positions = new Map();
          const zoneGroups = {};

          subgraphEntities.forEach((e) => {
            const zone = this.zoneMap[e.id];
            if (zone) {
              if (!zoneGroups[zone]) zoneGroups[zone] = [];
              zoneGroups[zone].push(e);
            }
          });

          Object.entries(zoneGroups).forEach(([zone, entities]) => {
            const baseX = ZONE_X[zone] || 80;
            entities.forEach((e, i) => {
              positions.set(e.id, { x: baseX, y: 80 + i * (280 + ZONE_NODESEP) });
            });
          });

          // Dagre fallback for nodes not in ZONE_MAP
          const unknownEntities = subgraphEntities.filter((e) => !this.zoneMap[e.id]);
          if (unknownEntities.length) {
            const g = new dagre.graphlib.Graph();
            g.setGraph({ rankdir: "LR", ranksep: ZONE_RANKSEP, nodesep: ZONE_NODESEP, marginx: 80, marginy: 80, ranker: "network-simplex" });
            g.setDefaultEdgeLabel(() => ({}));
            unknownEntities.forEach((e) => {
              const sz = WhiteboardProjectionEngine._estimate(e);
              g.setNode(e.id, { width: sz.width, height: sz.height, rank: e.rankHint || 0 });
            });
            subgraphRelations.forEach((r) => {
              const fromUnknown = !this.zoneMap[r.from];
              const toUnknown   = !this.zoneMap[r.to];
              if (fromUnknown && toUnknown) g.setEdge(r.from, r.to, { weight: 2, minlen: 1 });
            });
            try {
              dagre.layout(g);
              unknownEntities.forEach((e) => {
                const n = g.node(e.id);
                if (n) positions.set(e.id, { x: n.x - n.width / 2, y: n.y - n.height / 2 });
              });
            } catch (_) {}
          }

          return positions;
        }

        static _estimate(entity) {
          const metricsCount = Object.keys(entity.metrics || {}).length;
          if (entity.type === "GoldenBatch" || entity.id === "batch_current") {
            return { width: entity.chart ? 560 : 520, height: entity.chart ? 360 : 240 };
          }
          if (entity.type === "SimulationScenario") return { width: 420, height: 220 };
          if (entity.type === "ExternalSystem") return { width: 320, height: 130 + metricsCount * 26 };
          return { width: entity.chart ? 440 : 400, height: entity.chart ? 300 : 160 + metricsCount * 28 };
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // Helpers: projection relation filter  &  layout engine (dagre)
      // ─────────────────────────────────────────────────────────────────
      function buildProjectionRelations(subgraph) {
        const byId  = new Map(subgraph.entities.map((e) => [e.id, e]));
        const allow = new Set([
          "reference->live","cause->live","live->live","live->consequence",
          "live->simulation","simulation->consequence","simulation->endpoint","consequence->endpoint"
        ]);
        return subgraph.relations.filter((r) => {
          const fromRole = byId.get(r.from)?.projectionRole;
          const toRole   = byId.get(r.to)?.projectionRole;
          if (!fromRole || !toRole) return false;
          return allow.has(`${fromRole}->${toRole}`);
        });
      }

      class LayoutEngine {
        static persistedPositionsAreValid(p) {
          if (!p || typeof p !== "object") return false;
          const core = ["material_foil","sensor_tension","control_heater","asset_sealer","deviation","quality_seal","batch_current","sim_unchanged","sim_corrected","impact_loss","sys_mes","sys_qa","sys_erp"];
          for (const id of core) {
            const pos = p[id];
            if (!pos || !Number.isFinite(pos.x) || !Number.isFinite(pos.y)) return false;
            if (pos.x < 120 || pos.x > 2600 || pos.y < 60 || pos.y > 1900) return false;
          }
          return true;
        }

        static estimate(entity) {
          const metricsCount = Object.keys(entity.metrics || {}).length;
          if (entity.type === "GoldenBatch" || entity.id === "batch_current") {
            return { width: entity.chart ? 560 : 520, height: entity.chart ? 360 : 240 };
          }
          if (entity.type === "SimulationScenario") return { width: 420, height: 220 };
          if (entity.type === "ExternalSystem") return { width: 320, height: 130 + metricsCount * 26 };
          return { width: entity.chart ? 440 : 400, height: entity.chart ? 300 : 160 + metricsCount * 28 };
        }

        static run(subgraph, projectionRelations, persistedPositions = {}) {
          const g = new dagre.graphlib.Graph();
          g.setGraph({ rankdir: "LR", ranksep: 180, nodesep: 120, marginx: 80, marginy: 80, ranker: "network-simplex" });
          g.setDefaultEdgeLabel(() => ({}));

          subgraph.entities.forEach((e) => {
            const sz = LayoutEngine.estimate(e);
            g.setNode(e.id, { width: sz.width, height: sz.height, rank: e.rankHint });
          });
          subgraph.relations.forEach((r) => {
            g.setEdge(r.from, r.to, { weight: 2, minlen: 1 });
          });

          dagre.layout(g);

          const positions = {};
          subgraph.entities.forEach((e) => {
            const n = g.node(e.id);
            positions[e.id] = { x: n.x - n.width / 2, y: n.y - n.height / 2 };
          });

          LayoutEngine.compactProjection(subgraph, positions);

          if (LayoutEngine.persistedPositionsAreValid(persistedPositions)) {
            Object.keys(persistedPositions || {}).forEach((id) => {
              if (positions[id]) positions[id] = persistedPositions[id];
            });
          }

          LayoutEngine.ensureNoGoldenOverlap(positions);
          LayoutEngine.ensureScenePadding(positions, 120, 60);
          return positions;
        }

        static compactProjection(subgraph, positions) {
          positions.batch_golden = { x: 80, y: 70 };
          if (positions.batch_current && positions.sim_unchanged && positions.sim_corrected) {
            const by = positions.batch_current.y + 350;
            positions.sim_unchanged.y = by;
            positions.sim_corrected.y = by;
          }
        }

        static ensureNoGoldenOverlap(positions) {
          const g = positions.batch_golden;
          if (!g) return;
          const golden = { x: g.x, y: g.y, w: 560, h: 380 };
          const candidates = ["material_foil","sensor_tension","control_heater","asset_sealer"];
          const widths = { material_foil: 380, sensor_tension: 380, control_heater: 380, asset_sealer: 440 };
          candidates.forEach((id) => {
            const p = positions[id];
            if (!p) return;
            const w = widths[id] || 360;
            const overlaps = (p.x < golden.x + golden.w && p.x + w > golden.x && p.y < golden.y + golden.h && p.y + 250 > golden.y);
            if (overlaps) positions[id].y = golden.y + golden.h + 36;
          });
        }

        static ensureScenePadding(positions, minX = 72, minY = 36) {
          const ids = Object.keys(positions || {});
          if (!ids.length) return;
          const minPosX = Math.min(...ids.map((id) => Number(positions[id]?.x || 0)));
          const minPosY = Math.min(...ids.map((id) => Number(positions[id]?.y || 0)));
          const dx = minPosX < minX ? (minX - minPosX) : 0;
          const dy = minPosY < minY ? (minY - minPosY) : 0;
          if (!dx && !dy) return;
          ids.forEach((id) => {
            if (!positions[id]) return;
            positions[id].x += dx;
            positions[id].y += dy;
          });
        }
      }

      class UIState {
        constructor() {
          this.storage_key    = "mei_pkg_graph_state_v23";
          this.zoom           = 1;
          this.pan            = { x: 0, y: 0 };
          this.focusedNodeId  = null;
          this.expandedNodes  = new Set();
          this.selectedTab    = null;
          this.transform      = null; // d3 zoom identity set at runtime
          this.positions      = {};
          this.focus          = null;
          this.actionMode     = false;
          this.simulation     = { corrected: true };
        }
        snapshot() {
          return {
            storageVersion: "v23",
            positions:     this.positions,
            focus:         this.focus,
            expandedNodes: [...this.expandedNodes]
          };
        }
        save() {
          try { localStorage.setItem(this.storage_key, JSON.stringify(this.snapshot())); } catch (_) {}
        }
        load() {
          try {
            const raw = localStorage.getItem(this.storage_key);
            return raw ? JSON.parse(raw) : null;
          } catch (_) {
            return null;
          }
        }
      }
