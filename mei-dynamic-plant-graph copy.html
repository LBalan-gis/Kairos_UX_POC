        nodeClass(entity) {
          if (entity.type === "GoldenBatch" || entity.id === "batch_current") return "anchor-card";
          if (entity.type === "SimulationScenario") return "simulation-card";
          if (entity.type === "ExternalSystem") return "system-card";
          return "process-card";
        }

        nodeTier(entity) {
          if (["deviation", "batch_current", "quality_seal", "impact_loss"].includes(entity.id)) return "tier-primary";
          if (["asset_sealer", "batch_golden"].includes(entity.id)) return "tier-secondary";
          if (["material_foil", "sensor_tension", "control_heater"].includes(entity.id)) return "tier-tertiary";
          if (["sys_mes", "sys_qa", "sys_erp"].includes(entity.id)) return "tier-endpoint";
          return "";
        }

        nodeModeClass(entity) {
          if (["sys_mes", "sys_qa", "sys_erp"].includes(entity.id)) return "endpoint-card";
          if (["deviation", "batch_current", "quality_seal", "impact_loss"].includes(entity.id)) return "analytical-card";
          if (["asset_sealer", "material_foil", "sensor_tension", "control_heater", "batch_golden"].includes(entity.id)) return "operational-card";
          return "";
        }

        dynamicWidth(entity) {
          const widths = {
            "batch_golden": 560,
            "batch_current": 680,
            "deviation": 620,
            "quality_seal": 620,
            "impact_loss": 620,
            "asset_sealer": 440,
            "material_foil": 300,
            "sensor_tension": 300,
            "control_heater": 300,
            "sim_unchanged": 400,
            "sim_corrected": 400,
            "sys_mes": 300,
            "sys_qa": 300,
            "sys_erp": 300,
            "aux_sensor_2": 320,
            "aux_asset_2": 320
          };
          return widths[entity.id] || 380;
        }

        measureContentWidth(el, entity) {
          if (!el) return 0;
          const widestChild = Array.from(el.children || []).reduce((maxW, child) => {
            return Math.max(maxW, child.scrollWidth || child.clientWidth || 0);
          }, 0);
          const titleEstimate = Math.max(0, (entity.label || "").length * 8.4);
          const metricsEstimate = Object.keys(entity.metrics || {}).length * 44;
          const chartEstimate = entity.chart ? 280 : 0;
          return Math.max(widestChild, titleEstimate, metricsEstimate, chartEstimate);
        }

        bindNodeDrag(el, entityId) {
          if (entityId === "batch_golden") return;
          el.addEventListener("pointerdown", (e) => {
            if (e.button !== 0) return;
            e.stopPropagation();
            const rect = el.getBoundingClientRect();
            this.dragging = {
              id: entityId,
              ox: e.clientX - rect.left,
              oy: e.clientY - rect.top,
              moved: false
            };
            el.classList.add("dragging");
            el.setPointerCapture(e.pointerId);
          });

          el.addEventListener("pointermove", (e) => {
            if (!this.dragging || this.dragging.id !== entityId) return;
            this.dragging.moved = true;
            const boardRect = this.board.getBoundingClientRect();
            const t = this.state.transform || d3.zoomIdentity;
            const localX = (e.clientX - boardRect.left - t.x) / t.k - this.dragging.ox;
            const localY = (e.clientY - boardRect.top - t.y) / t.k - this.dragging.oy;
            this.state.positions[entityId] = { x: Math.max(20, localX), y: Math.max(20, localY) };
            el.style.left = `${this.state.positions[entityId].x}px`;
            el.style.top = `${this.state.positions[entityId].y}px`;
            this.renderEdges();
            if (this.state.focus) {
              const neighborhood = this.getConnectedImpactNeighborhood(this.state.focus);
              this.applyFocus(this.state.focus, { center: false, neighborhood });
            }
          });

          const onUp = (e) => {
            if (!this.dragging || this.dragging.id !== entityId) return;
            try { el.releasePointerCapture(e.pointerId); } catch (_) {}
            const moved = this.dragging.moved;
            this.dragging = null;
            el.classList.remove("dragging");
            if (!moved) {
              this.enterFocusMode(entityId, { center: false });
            } else {
              GraphStateStore.save({ positions: this.state.positions, focus: this.state.focus });
              if (this.state.focus) {
                const neighborhood = this.getConnectedImpactNeighborhood(this.state.focus);
                this.applyFocus(this.state.focus, { center: false, neighborhood });
              }
            }
          };

          el.addEventListener("pointerup", onUp);
          el.addEventListener("pointercancel", onUp);
        }

        stateToken(entity) {
          if (entity.type === "ExternalSystem") return "external";
          if (entity.type === "SimulationScenario") return "simulation";
          return entity.state || "normal";
        }

        ageText(entityId) {
          const ts = this.state.signalUpdatedAt?.[entityId];
          if (!ts) return "";
          const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
          if (sec < 60) return `${sec}s ago`;
          return `${Math.floor(sec / 60)}m ago`;
        }

        updateSignalAges() {
          this.nodeLayer.querySelectorAll(".node[data-id]").forEach((el) => {
            const id = el.getAttribute("data-id");
            const ageEl = el.querySelector(".signal-age");
            if (!id || !ageEl) return;
            const txt = this.ageText(id);
            if (txt) ageEl.textContent = `Updated ${txt}`;
            const ts = this.state.signalUpdatedAt?.[id] || 0;
            ageEl.classList.toggle("stale", (Date.now() - ts) > 30000);
          });
        }

        cardHtml(entity) {
          const accent = ACCENT[entity.type] || ["#8d99af", "#edf2fb"];
          const s = STATE_STYLE[this.stateToken(entity)] || STATE_STYLE.normal;
          const metrics = Object.entries(entity.metrics || {}).map(([k, v]) => `<div class=\"metric\"><span>${k}</span><b>${v}</b></div>`).join("");
          const p = Number.isFinite(entity.root_cause_probability)
            ? entity.root_cause_probability
            : Number.isFinite(entity.metadata?.root_cause_probability)
              ? entity.metadata.root_cause_probability
              : null;
          const probabilityBlock = (entity.projectionRole === "cause" && p !== null)
            ? `<div class="metric-probability"><span>Root cause likelihood</span><b>${Math.round(p * 100)}%</b></div>`
            : "";
          const primaryAnalytical = new Set(["deviation", "batch_current", "quality_seal", "impact_loss"]);
          const compactIds = new Set(["material_foil", "sensor_tension", "control_heater", "sys_mes", "sys_qa", "sys_erp"]);
          const probClass = (entity.projectionRole === "cause" && p !== null)
            ? (p > 0.5 ? "prob-high" : (p >= 0.25 ? "prob-medium" : ""))
            : "";
          const extraClass = `${primaryAnalytical.has(entity.id) ? " primary-analytical" : ""} ${entity.id === "deviation" ? " incident-root" : ""} ${entity.id === "batch_golden" ? " reference-node" : ""} ${compactIds.has(entity.id) ? " compact-card" : ""} ${this.nodeTier(entity)} ${this.nodeModeClass(entity)} ${probClass}`.trim();
          const isSignal = ["Sensor", "QualityState", "ControlParameter", "Asset"].includes(entity.type);
          const age = isSignal ? this.ageText(entity.id) : "";
          const ageClass = (isSignal && this.state.signalUpdatedAt && (Date.now() - (this.state.signalUpdatedAt[entity.id] || 0)) > 30000) ? " stale" : "";
          const confidence = entity.metadata?.confidence;
          const extraDetail = compactIds.has(entity.id)
            ? `<div class="extra-detail">${entity.metadata?.detail || entity.metadata?.description || ""}</div>`
            : "";
          return `
            <article class="node ${this.nodeClass(entity)} ${extraClass}" id="node-${entity.id}" data-id="${entity.id}" style="--accent:${accent[0]};--icon-bg:${accent[1]};--state-border:${s[0]};--state-bg:${s[1]};--state-fg:${s[2]}">
              <div class="node-header">
                <div class="node-header-main">
                  <div class="icon-chip">${ICON[entity.type] || "•"}</div>
                  <div><div class="title node-title">${entity.label}</div><div class="section-label">${entity.type}</div></div>
                </div>
                <span class="state node-status"><i></i>${(this.stateToken(entity)).toUpperCase()}</span>
              </div>
              <div class="node-body">
                <div class="sub">${entity.metadata.description || ""}</div>
                ${age ? `<div class="signal-age${ageClass}">Updated ${age}</div>` : ""}
                <div class="metrics">${metrics}</div>
                ${probabilityBlock}
                ${entity.insight ? `<button class=\"insight-chip\" data-focus=\"${entity.id}\"><i></i><span><strong>KairOS</strong><br>${entity.insight}${confidence ? `<br><span class=\"sub\">Confidence ${confidence}</span>` : ""}</span></button>` : ""}
                ${extraDetail}
                ${entity.chart ? (() => {
                  const goldenCompare = new Set(["batch_current", "quality_seal", "impact_loss"]);
                  const hasRanges = goldenCompare.has(entity.id);
                  const refLabel = hasRanges ? `<span class="spark-ref-label">vs. Golden Batch GB-2024-01</span>` : "";
                  const rangeCtrl = hasRanges
                    ? `<div class="spark-range" id="spark-range-${entity.id}"><button class="spark-range-btn" data-range="30m">30m</button><button class="spark-range-btn active" data-range="1h">1h</button><button class="spark-range-btn" data-range="4h">4h</button></div>`
                    : "";
                  const header = (refLabel || rangeCtrl) ? `<div class="spark-controls">${refLabel}${rangeCtrl}</div>` : "";
                  return `${header}<div class="spark"><canvas id="chart-${entity.id}"></canvas></div>`;
                })() : ""}
              </div>
            </article>`;
        }

        renderNodes() {
          const insightFocusMap = {
            sensor_tension: { root: "deviation", seeds: ["asset_sealer", "quality_seal"] },
            control_heater: { root: "asset_sealer", seeds: ["deviation"] },
            deviation: { root: "impact_loss", seeds: ["sim_corrected", "sim_unchanged"] },
            quality_seal: { root: "batch_current", seeds: ["impact_loss"] },
            batch_current: { root: "sim_corrected", seeds: ["impact_loss", "batch_golden"] },
            aux_sensor_2: { root: "aux_asset_2", seeds: [] }
          };
          this.nodeLayer.innerHTML = this.state.subgraph.entities.map((e) => this.cardHtml(e)).join("");
          this.state.subgraph.entities.forEach((e) => {
            const el = this.nodeLayer.querySelector(`[data-id="${e.id}"]`);
            const p = this.state.positions[e.id] || { x: 0, y: 0 };
            el.style.width = "max-content";
            el.style.left = `${p.x}px`;
            el.style.top = `${p.y}px`;
            el.querySelectorAll(".insight-chip").forEach((chip) => {
              chip.addEventListener("click", (ev) => {
                ev.stopPropagation();
                const target = insightFocusMap[e.id];
                if (target) this.enterFocusMode(target.root, { seedIds: target.seeds, center: true });
                else this.enterFocusMode(e.id, { center: true });
              });
            });
            const nodeBody = el.querySelector(".node-body");
            if (nodeBody && el.classList.contains("compact-card")) {
              nodeBody.addEventListener("click", (ev) => {
                if (ev.target.closest(".insight-chip")) return;
                ev.stopPropagation();
                el.classList.toggle("expanded");
              });
            }
            el.addEventListener("click", (ev) => {
              ev.stopPropagation();
              this.enterFocusMode(e.id, { center: false });
            });
            this.bindNodeDrag(el, e.id);
          });
        }

        nodeRect(id) {
          const el = this.nodeLayer.querySelector(`[data-id="${id}"]`);
          const p = this.state.positions[id];
          if (!el || !p) return null;
          const w = el.offsetWidth;
          const h = el.offsetHeight;
          return { x: p.x, y: p.y, w, h, cx: p.x + w / 2, cy: p.y + h / 2 };
        }

        edgePath(a, b) {
          const dx = b.cx - a.cx;
          const sx = dx >= 0 ? a.x + a.w : a.x;
          const ex = dx >= 0 ? b.x : b.x + b.w;
          const c1 = sx + Math.max(30, Math.abs(dx) * 0.26) * Math.sign(dx || 1);
          const c2 = ex - Math.max(30, Math.abs(dx) * 0.22) * Math.sign(dx || 1);
          return `M ${sx} ${a.cy} C ${c1} ${a.cy}, ${c2} ${b.cy}, ${ex} ${b.cy}`;
        }

        renderEdges() {
          const primarySpineEdges = new Set(["r4", "r5", "r6", "r7"]);
          const spineEdges = new Set(["r1", "r2", "r3", "r4", "r5", "r6", "r7"]);
          const branchEdges = new Set(["r9", "r10", "r11", "r12"]);
          const execEdges = new Set(["r13", "r14", "r15", "r16"]);
          const entityById = new Map(this.state.subgraph.entities.map((e) => [e.id, e]));
          const renderData = this.state.projection.relations.map((r) => {
            const a = this.nodeRect(r.from);
            const b = this.nodeRect(r.to);
            if (!a || !b) return null;
            const fromEntity = entityById.get(r.from);
            const probRaw = fromEntity && (Number.isFinite(fromEntity.root_cause_probability)
              ? fromEntity.root_cause_probability
              : Number.isFinite(fromEntity?.metadata?.root_cause_probability)
                ? fromEntity.metadata.root_cause_probability
                : null);
            const priorityCls =
              r.id === "r8" ? "golden-ref reference" :
              execEdges.has(r.id) ? "exec" :
              branchEdges.has(r.id) ? "branch" :
              primarySpineEdges.has(r.id) ? "primary-spine spine" :
              spineEdges.has(r.id) ? "spine" : "";
            const visualCls = branchEdges.has(r.id)
              ? "simulation"
              : (EDGE_STYLE[r.type]?.cls || "causal");
            const probEdge = (fromEntity?.projectionRole === "cause" && probRaw !== null);
            let probWidth = null;
            let probOpacity = null;
            let probLabel = null;
            if (probEdge) {
              if (probRaw > 0.5) {
                probWidth = 3.0;
                probOpacity = 0.96;
              } else if (probRaw >= 0.25) {
                probWidth = 2.2;
                probOpacity = 0.84;
              } else {
                probWidth = 1.4;
                probOpacity = 0.68;
              }
              probLabel = `${Math.round(probRaw * 100)}%`;
            }
            return { r, d: this.edgePath(a, b), lx: (a.cx + b.cx) / 2, ly: (a.cy + b.cy) / 2, priorityCls, visualCls, probEdge, probWidth, probOpacity, probLabel };
          }).filter(Boolean);

          const sel = this.edgeLayer.selectAll("path.edge").data(renderData, (d) => d.r.id);
          sel.enter()
            .append("path")
            .attr("class", (d) => `edge ${d.visualCls} ${d.priorityCls}`)
            .attr("marker-end", (d) => `url(#${EDGE_STYLE[d.r.type]?.marker || "arrow-causal"})`)
            .on("mouseenter", (event, d) => {
              d3.select(event.currentTarget).classed("focused", true);
              this.edgeLayer.selectAll("text.edge-label").classed("focused", (x) => x.r.id === d.r.id);
            })
            .on("mouseleave", (event) => {
              d3.select(event.currentTarget).classed("focused", false);
              this.edgeLayer.selectAll("text.edge-label").classed("focused", false);
            })
            .merge(sel)
            .attr("class", (d) => `edge ${d.visualCls} ${d.priorityCls}`)
            .style("stroke-width", (d) => d.probEdge ? `${d.probWidth}px` : null)
            .style("opacity", (d) => d.probEdge ? d.probOpacity : null)
            .attr("d", (d) => d.d);
          sel.exit().remove();

          const lsel = this.edgeLayer.selectAll("text.edge-label").data(renderData, (d) => `lbl-${d.r.id}`);
          lsel.enter()
            .append("text")
            .attr("class", "edge-label")
            .merge(lsel)
            .attr("x", (d) => d.lx)
            .attr("y", (d) => d.ly - 6)
            .attr("text-anchor", "middle")
            .text((d) => d.r.type.replace("_", " "));
          lsel.exit().remove();

          const probLabels = renderData.filter((d) => d.probEdge && d.probLabel);
          const pl = this.edgeLayer.selectAll("text.edge-prob-label").data(probLabels, (d) => `pl-${d.r.id}`);
          pl.enter()
            .append("text")
            .attr("class", "edge-prob-label")
            .merge(pl)
            .attr("x", (d) => d.lx + 12)
            .attr("y", (d) => d.ly - 10)
            .text((d) => d.probLabel);
          pl.exit().remove();

          const current = this.nodeRect("batch_current");
          const unchanged = this.nodeRect("sim_unchanged");
          const corrected = this.nodeRect("sim_corrected");
          const forkData = (current && unchanged && corrected) ? [{
            x: current.x + current.w * 0.88,
            y: current.y + current.h * 0.66,
            u: { x: unchanged.x + unchanged.w * 0.14, y: unchanged.y + unchanged.h * 0.14 },
            c: { x: corrected.x + corrected.w * 0.14, y: corrected.y + corrected.h * 0.14 }
          }] : [];

          const jsel = this.edgeLayer.selectAll("circle.fork-junction").data(forkData);
          jsel.enter().append("circle").attr("class", "fork-junction").attr("r", 3.5)
            .merge(jsel).attr("cx", (d) => d.x).attr("cy", (d) => d.y);
          jsel.exit().remove();

          const fpaths = [
            ...forkData.map((d) => ({ id: "u", cls: "unchanged", x1: d.x, y1: d.y, x2: d.u.x, y2: d.u.y })),
            ...forkData.map((d) => ({ id: "c", cls: "corrected", x1: d.x, y1: d.y, x2: d.c.x, y2: d.c.y }))
          ];
          const pf = this.edgeLayer.selectAll("path.fork-link").data(fpaths, (d) => d.id);
          pf.enter().append("path").attr("class", (d) => `simulation branch fork-link ${d.cls}`)
            .merge(pf)
            .attr("class", (d) => `simulation branch fork-link ${d.cls}`)
            .attr("d", (d) => `M ${d.x1} ${d.y1} C ${(d.x1 + d.x2)/2} ${d.y1}, ${(d.x1 + d.x2)/2} ${d.y2}, ${d.x2} ${d.y2}`);
          pf.exit().remove();

          const flabels = [
            ...forkData.map((d) => ({ id: "lu", x: (d.x + d.u.x) / 2 - 18, y: (d.y + d.u.y) / 2 - 6, t: "unchanged" })),
            ...forkData.map((d) => ({ id: "lc", x: (d.x + d.c.x) / 2 + 4, y: (d.y + d.c.y) / 2 - 6, t: "corrected" }))
          ];
          const ft = this.edgeLayer.selectAll("text.fork-label").data(flabels, (d) => d.id);
          ft.enter().append("text").attr("class", (d) => `fork-label ${d.t}`)
            .merge(ft)
            .attr("class", (d) => `fork-label ${d.t}`)
            .attr("x", (d) => d.x)
            .attr("y", (d) => d.y)
            .text((d) => d.t);
          ft.exit().remove();
        }

        applyFocus(focusId = this.state.focus, options = {}) {
          const { center = true, seedIds = [], neighborhood = null } = options;
          if (!focusId) {
            this.exitFocusMode();
            return;
          }
          this.state.focus = focusId;
          const resolvedNeighborhood = neighborhood || this.getConnectedImpactNeighborhood(focusId);
          const keepNodes = new Set((resolvedNeighborhood.nodeIds || []).concat(seedIds || [], [focusId]));
          const keepEdges = new Set(resolvedNeighborhood.edgeIds || []);

          if (!neighborhood && seedIds && seedIds.length) {
            seedIds.forEach((sid) => {
              this.state.projection.relations.forEach((r) => {
                if ((r.from === sid || r.to === sid) && keepNodes.has(r.from) && keepNodes.has(r.to)) {
                  keepEdges.add(r.id);
                }
              });
            });
          }

          this.nodeLayer.querySelectorAll(".node").forEach((el) => {
            const id = el.getAttribute("data-id");
            const isCompact = el.classList.contains("compact-card");
            const willExpand = keepNodes.has(id) && isCompact;
            el.classList.toggle("dimmed", !keepNodes.has(id));
            el.classList.toggle("focal", id === focusId);
            el.classList.toggle("focus-root", id === focusId);
            el.classList.toggle("expanded", willExpand);
          });

          this.edgeLayer.selectAll("path.edge")
            .classed("focused", (d) => !!(d && d.r && keepEdges.has(d.r.id)))
            .classed("dimmed", (d) => !!(d && d.r && !keepEdges.has(d.r.id)));
          this.edgeLayer.selectAll("text.edge-label")
            .classed("focused", (d) => !!(d && d.r && keepEdges.has(d.r.id)));

          this.updateActionsForFocus(focusId, keepNodes);
          if (this.focusExit) this.focusExit.classList.add("show");
          if (center) {
            this.centerOnNodes(Array.from(keepNodes), true, 0.72);
          }
        }

        updateActionsForFocus(focusId, keepNodes) {
          if (!this.actionsBar) return;
          this.actionsBar.querySelectorAll(".action-btn").forEach((btn) => {
            const scope = (btn.getAttribute("data-focus") || "").split(",").map((s) => s.trim()).filter(Boolean);
            const active = scope.includes(focusId) || scope.some((id) => keepNodes.has(id));
            btn.classList.toggle("active", active);
            btn.classList.toggle("dimmed", !active);
          });
        }

        render() {
          this.renderNodes();
          this.renderEdges();
          this.renderCharts();
          if (this.state.actionMode && this.state.focus) {
            const neighborhood = this.getConnectedImpactNeighborhood(this.state.focus);
            this.applyFocus(this.state.focus, { center: false, neighborhood });
          }
        }
      }

      function createPlantKnowledgeGraph() {
        const g = new PlantKnowledgeGraph();

        [
          new GraphEntity({ id: "batch_golden", type: "GoldenBatch", label: "Golden Batch GB-2024-01", state: "normal", chart: "golden", rankHint: 0, projectionRole: "reference", pinned: { x: 80, y: 70 }, metadata: { description: "Reference profile", detail: "Validated baseline for blister packaging line B4" }, metrics: { Yield: "98.7%", Speed: "280 ppm" } }),
          new GraphEntity({ id: "material_foil", type: "Material", label: "Foil Roll A12", state: "warning", chart: "foil", rankHint: 1, projectionRole: "cause", root_cause_probability: 0.20, metadata: { description: "Lot FR-A12-09", detail: "Supplier lot FR-A12-09 in active web feed" }, metrics: { Tension: "+7.8%", Temp: "27.4C" } }),
          new GraphEntity({ id: "sensor_tension", type: "Sensor", label: "Web Tension Sensor", state: "warning", chart: "tension", rankHint: 1, projectionRole: "cause", root_cause_probability: 0.62, metadata: { description: "Sensor T-44", confidence: "0.94", detail: "Signal drift persists across last 19 minutes" }, metrics: { Drift: "+7.8%", Confidence: "0.94" }, insight: "Drift detected 19 min ago" }),
          new GraphEntity({ id: "control_heater", type: "ControlParameter", label: "Heater Zone 3", state: "warning", chart: "heater", rankHint: 1, projectionRole: "cause", root_cause_probability: 0.18, metadata: { description: "Loop HZ-3", confidence: "0.86", detail: "Control loop offset detected above expected band" }, metrics: { Setpoint: "183C", Offset: "+2.2C" }, insight: "Likely heater offset" }),
          new GraphEntity({ id: "asset_sealer", type: "Asset", label: "Blister Sealer", state: "critical", rankHint: 2, projectionRole: "live", metadata: { description: "Line B4", detail: "Packaging speed currently constrained by drift response" }, metrics: { Speed: "320 ppm", TempDrift: "+2.2C" } }),
          new GraphEntity({ id: "deviation", type: "Deviation", label: "Seal Drift Deviation", state: "critical", rankHint: 3, projectionRole: "live", metadata: { description: "DV-2026-031", confidence: "0.89", detail: "Deviation window open for 25 minutes" }, metrics: { Severity: "Major", Window: "25 min" }, insight: "Projected scrap €132K/day" }),
          new GraphEntity({ id: "quality_seal", type: "QualityState", label: "Seal Strength", state: "critical", chart: "quality", rankHint: 4, projectionRole: "live", metadata: { description: "Release quality", confidence: "0.84", detail: "Release threshold breach trend accelerating" }, metrics: { Index: "86.1/100", Forecast: "34% in 90m", "Lower Limit": "16.2", "Current Risk": "High" }, insight: "Seal degradation in progress" }),
          new GraphEntity({ id: "batch_current", type: "Batch", label: "Current Batch SB-2024-04", state: "warning", chart: "current", rankHint: 4, projectionRole: "live", metadata: { description: "Live batch", confidence: "0.86", detail: "Process diverges from golden reference since t-26" }, metrics: { Speed: "320 ppm", Yield: "97.1%", "Drift Start": "t-26 min", "Delta vs Golden": "+7.1%" }, insight: "Diverging from golden batch" }),
          new GraphEntity({ id: "sim_unchanged", type: "SimulationScenario", label: "If unchanged", state: "simulation", rankHint: 5, projectionRole: "simulation", metadata: { description: "Continuation path", pathType: "risk" }, metrics: { ScrapRisk: "34%", Loss: "€132K/day", Trend: "Accelerating" }, insight: "High-risk path — €42.8K/day unmitigated exposure at current rate" }),
          new GraphEntity({ id: "sim_corrected", type: "SimulationScenario", label: "If corrected", state: "simulation", rankHint: 5, projectionRole: "simulation", metadata: { description: "Reduce speed to 260 ppm", pathType: "recovery" }, metrics: { ScrapRisk: "4%", Savings: "€117K/day", Confidence: "0.86" }, insight: "Recommended — 86% confidence · Reduces exposure to €15K/day" }),
          new GraphEntity({ id: "impact_loss", type: "FinancialImpact", label: "Loss Projection", state: "warning", chart: "finance", rankHint: 6, projectionRole: "consequence", metadata: { description: "Cost trajectory" }, metrics: { Unchanged: "€132K/day", Corrected: "€15K/day", "90m Exposure": "€16.5K", "Daily Exposure": "€132K" } }),
          new GraphEntity({ id: "sys_mes", type: "ExternalSystem", label: "MES", state: "external", rankHint: 7, projectionRole: "endpoint", metadata: { description: "Execution layer", detail: "Deviation log DV-2026-031 queued — awaiting operator confirmation to execute" }, metrics: { Workflow: "Pending", Action: "Log DV-2026-031", Trigger: "Both paths" } }),
          new GraphEntity({ id: "sys_qa", type: "ExternalSystem", label: "QA", state: "external", rankHint: 7, projectionRole: "endpoint", metadata: { description: "Approval layer", detail: "QA escalation opened — approval required before batch release" }, metrics: { Workflow: "Notified", Approval: "Required", Trigger: "Unchanged path" } }),
          new GraphEntity({ id: "sys_erp", type: "ExternalSystem", label: "ERP", state: "external", rankHint: 7, projectionRole: "endpoint", metadata: { description: "Cost sync layer", detail: "Cost exposure model pending sync — €42.8K/day to be updated on correction" }, metrics: { Workflow: "Sync pending", Exposure: "€42.8K/day", Trigger: "Corrected path" } }),

          new GraphEntity({ id: "aux_sensor_2", type: "Sensor", label: "Web Camera WC-02", state: "normal", rankHint: 1, projectionRole: "cause", root_cause_probability: 0.04, metadata: { description: "Visual inspection sensor", confidence: "0.91", detail: "Monitoring foil surface defects and web alignment in real-time" }, metrics: { Status: "Nominal", "Defect Rate": "0.3%" }, insight: "No surface anomalies detected" }),
          new GraphEntity({ id: "aux_asset_2", type: "Asset", label: "Cutter Unit C-04", state: "normal", rankHint: 2, projectionRole: "live", metadata: { description: "Line B4 cutter", detail: "Operating within normal speed and alignment parameters" }, metrics: { Speed: "285 ppm", Alignment: "OK" } })
        ].forEach((e) => g.addEntity(e));

        [
          new GraphRelation({ id: "r1", from: "material_foil", to: "asset_sealer", type: "feeds" }),
          new GraphRelation({ id: "r2", from: "sensor_tension", to: "asset_sealer", type: "measured_by" }),
          new GraphRelation({ id: "r3", from: "control_heater", to: "asset_sealer", type: "controls" }),
          new GraphRelation({ id: "r4", from: "asset_sealer", to: "deviation", type: "causes" }),
          new GraphRelation({ id: "r5", from: "deviation", to: "quality_seal", type: "affects" }),
          new GraphRelation({ id: "r6", from: "quality_seal", to: "batch_current", type: "affects" }),
          new GraphRelation({ id: "r7", from: "batch_current", to: "impact_loss", type: "impacts_cost" }),
          new GraphRelation({ id: "r8", from: "batch_golden", to: "batch_current", type: "references" }),
          new GraphRelation({ id: "r9", from: "batch_current", to: "sim_unchanged", type: "simulated_as" }),
          new GraphRelation({ id: "r10", from: "batch_current", to: "sim_corrected", type: "simulated_as" }),
          new GraphRelation({ id: "r11", from: "sim_unchanged", to: "impact_loss", type: "impacts_cost" }),
          new GraphRelation({ id: "r12", from: "sim_corrected", to: "impact_loss", type: "mitigates" }),
          new GraphRelation({ id: "r13", from: "sim_unchanged", to: "sys_mes", type: "logged_in" }),
          new GraphRelation({ id: "r14", from: "sim_unchanged", to: "sys_qa", type: "approved_by" }),
          new GraphRelation({ id: "r15", from: "sim_corrected", to: "sys_mes", type: "logged_in" }),
          new GraphRelation({ id: "r16", from: "sim_corrected", to: "sys_erp", type: "logged_in" }),

          new GraphRelation({ id: "r17", from: "aux_sensor_2", to: "aux_asset_2", type: "measured_by" })
        ].forEach((r) => g.addRelation(r));

        return g;
      }

      function startClock() {
        const clock = document.getElementById("clock");
        const tick = () => {
          clock.textContent = new Date().toLocaleTimeString([], { hour12: false });
        };
        tick();
        setInterval(tick, 1000);
      }

      function initThemeToggle() {
        const btn = document.getElementById("themeToggle");
        if (!btn) return;
        const saved = localStorage.getItem(THEME_KEY);
        const isDark = saved === "dark";
        document.body.classList.toggle("dark", isDark);
        btn.dataset.mode = isDark ? "Night" : "Day";
        btn.addEventListener("click", () => {
          const nextDark = !document.body.classList.contains("dark");
          document.body.classList.toggle("dark", nextDark);
          localStorage.setItem(THEME_KEY, nextDark ? "dark" : "light");
          btn.dataset.mode = nextDark ? "Night" : "Day";
          window.dispatchEvent(new Event("mei-theme-change"));
        });
      }

      function initSimToggle(state, renderer) {
        const btn = document.getElementById("simToggle");
        if (!btn) return;
        const update = () => {
          btn.dataset.mode = state.simulation.corrected ? "Corrected" : "Unchanged";
        };
        update();
        btn.addEventListener("click", () => {
          state.simulation.corrected = !state.simulation.corrected;
          update();
          renderer.scheduleRender();
        });
      }

      function initDensityToggle(renderer) {
        const btn = document.getElementById("densityToggle");
        if (!btn) return;
        const key = "mei_density_mode";
        const saved = localStorage.getItem(key);
        const compact = saved === "compact";
        document.body.classList.toggle("compact", compact);
        btn.dataset.mode = compact ? "Compact" : "Expanded";
        btn.addEventListener("click", () => {
          const nextCompact = !document.body.classList.contains("compact");
          document.body.classList.toggle("compact", nextCompact);
          localStorage.setItem(key, nextCompact ? "compact" : "expanded");
          btn.dataset.mode = nextCompact ? "Compact" : "Expanded";
          renderer?.scheduleRender();
          requestAnimationFrame(() => renderer?.fitToScene(false));
        });
      }

      function boot() {
        startClock();
        initThemeToggle();
        if (!window.Chart) {
          console.error("Chart.js failed to load. Verify chart.umd.min.js is reachable.");
        }
        const graph = createPlantKnowledgeGraph();
        const subgraph = IncidentSubgraphExtractor.extract(graph, "deviation");
        const projectionRelations = buildProjectionRelations(subgraph);

        let persisted = GraphStateStore.load();
        if (persisted && persisted.positions && !LayoutEngine.persistedPositionsAreValid(persisted.positions)) {
          try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
          persisted = null;
        }
        const positions = LayoutEngine.run(subgraph, projectionRelations, persisted?.positions || {});

        const state = {
          graph,
          subgraph,
          projection: { relations: projectionRelations },
          positions,
          focus: persisted?.focus || null,
          actionMode: false,
          simulation: { corrected: true },
          signalUpdatedAt: Object.fromEntries(subgraph.entities.map((e) => [e.id, Date.now()])),
          transform: d3.zoomIdentity
        };

        const renderer = new Renderer(state);
        initDensityToggle(renderer);
        initSimToggle(state, renderer);
        renderer.scheduleRender();
        window.addEventListener("mei-theme-change", () => {
          renderer.scheduleRender();
        });
        requestAnimationFrame(() => {
          renderer.fitToScene(false);
          if (state.focus) renderer.enterFocusMode(state.focus, { center: false });
        });

        document.getElementById("board").addEventListener("click", (e) => {
          if (renderer.state.actionMode && !renderer.dragging && !e.target.closest(".node")) {
            renderer.exitFocusMode();
          }
        });

        window.addEventListener("resize", () => {
          renderer.scheduleRender();
          requestAnimationFrame(() => renderer.fitToScene(false));
        });

        setInterval(() => {
          const batchChart = renderer.chartInstances.batch_current;
          if (batchChart && batchChart.canvas && batchChart.canvas.isConnected && batchChart.data?.datasets?.[1]?.data) {
            const ds = batchChart.data.datasets[1].data;
            const next = Math.max(18, Math.min(31, ds[ds.length - 1] + (Math.random() - 0.30) * 0.55));
            ds.push(Number(next.toFixed(2)));
            ds.shift();
            try { batchChart.update("none"); } catch (_) {}
          }
          const qualityChart = renderer.chartInstances.quality_seal;
          if (qualityChart && qualityChart.canvas && qualityChart.canvas.isConnected && qualityChart.data?.datasets?.[0]?.data) {
            const q = qualityChart.data.datasets[0].data;
            const nextQ = Math.max(4, Math.min(24, q[q.length - 1] + (Math.random() - 0.68) * 0.52));
            q.push(Number(nextQ.toFixed(2)));
            q.shift();
            const breach = q.map((v) => (v !== null && (v < 16.2 || v > 22.5) ? v : null));
            if (qualityChart.data.datasets[3]) qualityChart.data.datasets[3].data = breach;
            try { qualityChart.update("none"); } catch (_) {}
          }
          ["sensor_tension", "control_heater", "asset_sealer", "quality_seal", "batch_current", "aux_sensor_2", "aux_asset_2"].forEach((id) => {
            state.signalUpdatedAt[id] = Date.now();
          });
          renderer.updateSignalAges();
        }, 2400);

        setInterval(() => {
          renderer.updateSignalAges();
        }, 1000);

        window.addEventListener("beforeunload", () => {
          GraphStateStore.save({ positions: state.positions, focus: state.focus });
        });
      }

      boot();
    })();
  </script>
</body>
