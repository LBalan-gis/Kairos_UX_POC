<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KairOS Dynamic Plant Graph</title>
  <style>
    :root {
      --bg: #f1f2f7;
      --panel: #f6f7fb;
      --text: #1d1b20;
      --muted: #625b71;

      --material: #6750a4;
      --sensor: #006a6a;
      --control: #386a20;
      --asset: #00639b;
      --deviation: #ba1a1a;
      --quality: #7a5900;
      --batch: #4a4458;
      --financial: #4d5d2a;
      --simulation: #7e57c2;
      --system: #5f6368;

      --gold-ref: #b68c2d;
      --live-blue: #2b66d9;
      --threshold: #7b8190;
      --loss: #ba1a1a;
      --recovery: #2e7d32;

      --radius: 10px;
      --shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-size: 16px;
      overflow: hidden;
      background: var(--bg);
      color: #1e293b;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 64px 42px 40px 1fr 72px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid rgba(99, 106, 128, 0.16);
      background: rgba(246, 247, 252, 0.72);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(14px);
      z-index: 20;
    }

    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mark {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #6076c2;
      background: #ebf0ff;
    }
    .brand b { font-size: 22px; font-weight: 650; letter-spacing: 0.01em; }
    .context {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .command {
      height: 40px;
      width: min(640px, 58vw);
      border: 1px solid rgba(99, 106, 128, 0.2);
      border-radius: 999px;
      background: rgba(251, 252, 255, 0.58);
      backdrop-filter: blur(14px) saturate(125%);
      -webkit-backdrop-filter: blur(10px);
      color: #4a5163;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      font-size: 15px;
      cursor: pointer;
    }
    .command:focus-visible,
    .action-btn:focus-visible,
    .theme-toggle:focus-visible,
    .focus-exit:focus-visible,
    .insight-chip:focus-visible {
      outline: 2px solid #7aa2ff;
      outline-offset: 2px;
    }

    .command-menu {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, 72vw);
      border: 1px solid rgba(99, 106, 128, 0.18);
      border-radius: 14px;
      background: rgba(247, 248, 253, 0.76);
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
      padding: 10px;
      display: none;
      z-index: 40;
    }
    .command-menu.show { display: block; }
    .command-menu input {
      width: 100%;
      height: 40px;
      border: 1px solid rgba(99, 106, 128, 0.18);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      background: rgba(255,255,255,0.62);
      color: #1e293b;
    }
    .command-list {
      margin-top: 8px;
      display: grid;
      gap: 6px;
      max-height: 220px;
      overflow: auto;
    }
    .command-item {
      border: 1px solid rgba(99, 106, 128, 0.18);
      border-radius: 10px;
      background: rgba(251,252,255,0.58);
      color: #3b4253;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
    }

    .status { justify-self: end; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #44536e; }
    .live {
      border: 1px solid rgba(103, 80, 164, 0.24);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(242, 236, 255, 0.64);
      color: #5e46a5;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .live i { width: 7px; height: 7px; border-radius: 50%; background: #5c78de; display: inline-block; }

    .board {
      position: relative;
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(circle at 1px 1px, rgba(95, 106, 126, 0.16) 1px, transparent 1.2px) 0 0 / 22px 22px,
        radial-gradient(circle at 1px 1px, rgba(122, 116, 152, 0.06) 1px, transparent 1.2px) 11px 11px / 22px 22px,
        linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(241,242,247,0.14) 100%),
        var(--bg);
    }
    .timeline {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid rgba(99, 106, 128, 0.14);
      background: rgba(246, 247, 252, 0.54);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(8px);
      overflow-x: auto;
      white-space: nowrap;
      z-index: 15;
    }
    .timeline .event {
      border: 1px solid rgba(99, 106, 128, 0.16);
      border-radius: 999px;
      background: rgba(251,252,255,0.52);
      color: #454d5f;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .timeline .event b {
      color: #24364f;
      margin-right: 6px;
      font-weight: 700;
    }

    #viewport {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
    }

    #edgeSvg, #nodeLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #edgeSvg { pointer-events: none; }

    .node {
      position: absolute;
      border-radius: 24px;
      border: 1px solid rgba(73, 69, 79, 0.16);
      background: linear-gradient(160deg, rgba(255,255,255,0.86) 0%, rgba(252,248,255,0.76) 100%);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 18px 36px rgba(30, 27, 32, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.76);
      padding: 26px 28px 24px;
      font-size: 15px;
      line-height: 1.65;
      color: #1e293b;
      cursor: grab;
      user-select: none;
      touch-action: none;
      overflow: hidden;
      transition:
        transform 120ms ease,
        box-shadow 120ms ease,
        opacity 120ms ease;
      min-height: 220px;
    }
    .node.dragging { cursor: grabbing; }
    .node:hover {
      box-shadow:
        0 20px 42px rgba(30, 27, 32, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .node:active {
      cursor: grabbing;
      transform: scale(1.02);
    }

    .node::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 24px 0 0 24px;
      background: var(--accent, #90a0b9);
    }

    .node::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 0;
      height: 2px;
      border-radius: 0 0 4px 4px;
      background: var(--accent, #90a0b9);
      opacity: 0.35;
    }

    .anchor-card {
      min-width: 520px;
      border-radius: 24px;
    }
    .process-card {
      min-width: 400px;
      border-radius: 24px;
    }
    .simulation-card {
      min-width: 380px;
      border-style: dashed;
      background: linear-gradient(180deg, rgba(245, 241, 255, 0.82) 0%, rgba(238, 233, 255, 0.74) 100%);
      border-radius: 24px;
    }
    .system-card {
      min-width: 300px;
      min-height: 130px;
      padding: 16px 16px 14px 16px;
      border-radius: 20px;
    }
    .system-card .spark { display: none; }
    .system-card .metrics { gap: 6px; margin-bottom: 0; }
    .system-card .metric { font-size: 15px; }
    .system-card .metric b { font-size: 18px; }

    .tier-primary {
      border-color: #b2c6de;
      box-shadow: 0 28px 56px rgba(15, 23, 42, 0.22), inset 0 1px 0 rgba(255,255,255,0.82);
    }
    .tier-secondary {
      border-color: #cfdae8;
      box-shadow: 0 14px 26px rgba(15, 23, 42, 0.11), inset 0 1px 0 rgba(255,255,255,0.68);
    }
    .tier-tertiary {
      border-color: #dde5ee;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05), inset 0 1px 0 rgba(255,255,255,0.58);
      opacity: 0.78;
    }
    .tier-endpoint {
      border-color: #e0e7f0;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04), inset 0 1px 0 rgba(255,255,255,0.56);
      opacity: 0.72;
    }
    .operational-card .insight-chip { opacity: 0.92; }
    .analytical-card .insight-chip {
      border-color: #ccdaf7;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.7),
        0 5px 14px rgba(21, 43, 82, 0.12);
    }
    .analytical-card .spark { border-top-color: #d5e0f2; }
    .endpoint-card .sub { font-size: 15px; }
    .endpoint-card .metrics { margin-bottom: 0; gap: 6px; }
    .endpoint-card .metric { font-size: 15px; }
    .endpoint-card .metric b { font-size: 14px; }

    .node-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 14px;
    }
    .node-header-main {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .icon-chip {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      background: var(--icon-bg, #edf2fb);
    }
    .icon-chip svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .node-title,
    .node .title {
      font-size: clamp(30px, 2.8vw, 42px);
      font-weight: 750;
      line-height: 1.18;
      letter-spacing: 0.01em;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .tier-primary .node-title,
    .tier-primary .title {
      font-size: 24px;
      font-weight: 760;
    }

    .tier-secondary .node-title,
    .tier-secondary .title {
      font-size: 20px;
    }

    .tier-tertiary .node-title,
    .tier-tertiary .title {
      font-size: 17px;
    }

    .tier-endpoint .node-title,
    .tier-endpoint .title {
      font-size: 16px;
    }

    .node .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 750;
      color: #64748b;
      margin-bottom: 8px;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: #64748b;
    }

    .node-status,
    .state {
      font-size: clamp(13px, 1.1vw, 17px);
      font-weight: 750;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f1f5f9;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid var(--state-border, #cbd5e1);
      color: var(--state-fg, #5f6f89);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .state i { width: 7px; height: 7px; border-radius: 50%; background: currentColor; display: inline-block; }
    .node-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .signal-age {
      font-size: clamp(14px, 1.2vw, 18px);
      color: #6b7c95;
      font-weight: 650;
      margin-top: 2px;
      margin-bottom: 2px;
    }
    .signal-age.stale { color: #a16207; }
    .sub { font-size: clamp(18px, 1.6vw, 26px); font-weight: 600; line-height: 1.5; color: #4b5d74; margin-bottom: 0; }

    .metrics { display: grid; gap: 8px; margin-top: 0; margin-bottom: 16px; }
    .node .metric {
      display: flex;
      justify-content: space-between;
      font-size: clamp(16px, 1.4vw, 22px);
      font-weight: 600;
      color: #475569;
      margin-top: 0;
    }
    .node .metric b {
      font-size: clamp(28px, 2.4vw, 38px);
      font-weight: 780;
      line-height: 1.08;
      color: #0f172a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      font-size: clamp(17px, 1.5vw, 24px);
      font-weight: 650;
      color: #475569;
    }
    .metric b {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: clamp(30px, 2.6vw, 40px);
      font-weight: 780;
      line-height: 1.08;
      color: #0f172a;
    }

    .metric-probability {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #475569;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      border-top: 1px dashed rgba(100,116,139,0.22);
      padding-top: 8px;
      margin-top: 2px;
    }
    .metric-probability b {
      font-size: 20px;
      font-weight: 750;
      color: #0f172a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .simulation-card .node-title,
    .simulation-card .title {
      font-size: 18px;
      font-weight: 720;
    }

    .node.prob-high:not(.focus-root):not(.focal) { transform: scale(1.04); }
    .node.prob-medium:not(.focus-root):not(.focal) { transform: scale(1.02); }

    .insight-chip {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d7e3ff;
      background: linear-gradient(180deg, rgba(248,251,255,0.96) 0%, rgba(238,244,255,0.90) 100%);
      color: #24364f;
      font-size: 16px;
      font-weight: 650;
      line-height: 1.48;
      text-align: left;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.72),
        0 4px 12px rgba(21, 43, 82, 0.08);
    }

    .insight-chip i {
      width: 10px;
      height: 10px;
      margin-top: 5px;
      border-radius: 50%;
      background: #3b66c2;
      display: inline-block;
      box-shadow: 0 0 0 8px rgba(59,102,194,0.10);
      flex: 0 0 10px;
    }

    .insight-chip strong {
      display: block;
      font-size: 13px;
      font-weight: 780;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #5b74a8;
      margin-bottom: 4px;
    }

    @keyframes meiPulse {
      0% { box-shadow: 0 0 0 0 rgba(59,102,194,0.35); }
      70% { box-shadow: 0 0 0 8px rgba(59,102,194,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,102,194,0); }
    }

    .spark-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      margin-bottom: 4px;
      gap: 8px;
    }
    .spark-ref-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #b68c2d;
      opacity: 0.82;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .spark-ref-label::before {
      content: "";
      display: inline-block;
      width: 20px;
      height: 2px;
      background: currentColor;
      border-radius: 1px;
      opacity: 0.65;
    }
    .spark-range { display: flex; gap: 3px; }
    .spark-range-btn {
      border: 1px solid rgba(99,106,128,0.18);
      border-radius: 999px;
      background: transparent;
      color: #64748b;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      cursor: pointer;
      transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
    }
    .spark-range-btn:hover { border-color: rgba(47,107,255,0.22); color: #3b5fc0; }
    .spark-range-btn.active {
      background: rgba(47,107,255,0.10);
      border-color: rgba(47,107,255,0.30);
      color: #2f6bff;
    }
    body.dark .spark-ref-label { color: #e0b85a; opacity: 0.7; }
    body.dark .spark-range-btn { color: #94a3b8; border-color: rgba(208,188,255,0.18); }
    body.dark .spark-range-btn:hover { border-color: rgba(137,180,255,0.36); color: #89b4ff; }
    body.dark .spark-range-btn.active { background: rgba(105,147,255,0.16); border-color: rgba(105,147,255,0.38); color: #89b4ff; }

    .spark {
      margin-top: 0;
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
      width: 100%;
      min-width: 340px;
      height: 240px;
      position: relative;
    }

    .spark canvas { width: 100%; height: 100%; display: block; }
    .anchor-card .spark { width: 600px; height: 280px; }
    .process-card .spark { width: 520px; height: 300px; }
    .simulation-card .spark { width: 480px; height: 220px; }
    #node-batch_current .spark { width: 660px; height: 320px; }
    #node-quality_seal .spark { width: 620px; height: 310px; }
    #node-impact_loss .spark { width: 620px; height: 320px; }
    #node-batch_golden .spark { width: 580px; height: 240px; }
    #node-sensor_tension .spark { width: 400px; height: 200px; }
    #node-control_heater .spark { width: 400px; height: 200px; }
    #node-material_foil .spark { width: 400px; height: 200px; }
    .system-card .spark { display: none; }

    .primary-analytical {
      box-shadow: 0 14px 34px rgba(15,23,42,0.12);
      border-color: #cfd9e8;
    }

    .theme-toggle {
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 10px;
      padding: 6px 10px;
      background: rgba(242, 246, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #3f5ea5;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .theme-toggle::after {
      content: attr(data-mode);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 20px;
      border-radius: 999px;
      background: rgba(63, 94, 165, 0.12);
      color: #2f4f8f;
      font-size: 10px;
      font-weight: 700;
    }

    .edge { fill: none; opacity: 0.32; transition: opacity 120ms ease; stroke-linecap: round; stroke-linejoin: round; }
    .edge.material   { stroke: #6750a4; stroke-width: 3px; }
    .edge.causal     { stroke: #625b71; stroke-width: 2px; }
    .edge.deviation  { stroke: #ba1a1a; stroke-width: 3.5px; stroke-dasharray: 8 5; }
    .edge.control    { stroke: #386a20; stroke-width: 2.5px; }
    .edge.simulation { stroke: #7e57c2; stroke-width: 2.5px; stroke-dasharray: 4 6; opacity: 0.38; }
    .edge.system     { stroke: #cac4d0; stroke-width: 1.5px; opacity: 0.22; }
    .edge.spine         { opacity: 0.82; stroke-width: 5px; }
    .edge.primary-spine { opacity: 1;    stroke-width: 7px; }
    .edge.branch        { opacity: 0.52; stroke-width: 3px; }
    .edge.exec          { opacity: 0.18; stroke-width: 1.5px; }
    .edge.reference     { opacity: 0.10; stroke-width: 1.5px; stroke-dasharray: 5 5; }
    .edge.focused {
      opacity: 1 !important;
      stroke: #6750a4 !important;
      stroke-width: 4px !important;
      filter: drop-shadow(0 0 4px rgba(103,80,164,0.45));
    }
    .edge.focused.primary-spine {
      stroke-width: 8px !important;
      filter: drop-shadow(0 0 6px rgba(103,80,164,0.55));
    }
    .edge.focused.spine {
      stroke-width: 6px !important;
    }
    .edge.focused.golden-ref {
      stroke: #b68c2d !important;
      filter: drop-shadow(0 0 4px rgba(182,140,45,0.40));
    }
    .edge.dimmed { opacity: 0.05 !important; }
    .fork-link {
      fill: none;
      stroke: #8a74ee;
      stroke-width: 2px;
      stroke-dasharray: 4 4;
      opacity: 0.78;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .fork-link.unchanged { stroke: #b56a79; }
    .fork-link.corrected { stroke: #7a68e8; }
    .edge-label {
      font-size: 18px;
      font-weight: 700;
      fill: #334155;
      opacity: 0.72;
      pointer-events: none;
      transition: opacity 120ms ease;
      letter-spacing: 0.01em;
    }
    .edge-label.focused { opacity: 1; }
    .edge-prob-label {
      font-size: 16px;
      fill: #475569;

      };

      const ACCENT = {
        Material:           ["#6750a4", "#f3edf7"],
        Sensor:             ["#006a6a", "#cce8e8"],
        ControlParameter:   ["#386a20", "#d6eacb"],
        Asset:              ["#00639b", "#cde5ff"],

        Batch:              ["#4a4458", "#ece6f0"],
        GoldenBatch:        ["#b68c2d", "#fff3cf"],

        Action:             ["#625b71", "#ece6f0"]
      };

      const STATE_STYLE = {
        normal:     ["#cac4d0", "#f3f6fc", "#49454f"],
        warning:    ["#f59e0b", "#fdf8e6", "#7c5500"],
        critical:   ["#ba1a1a", "#ffdad6", "#93000a"],
        simulation: ["#7c3aed", "#f0ebff", "#4a0072"],
        external:   ["#8e9099", "#f3f6fc", "#44474f"]
      };

      const EDGE_STYLE = {
        feeds: { cls: "material", marker: "arrow-material" },
        measured_by: { cls: "causal", marker: "arrow-causal" },
        controls: { cls: "control", marker: "arrow-control" },
        causes: { cls: "causal", marker: "arrow-causal" },
        affects: { cls: "deviation", marker: "arrow-deviation" },

        logged_in: { cls: "system", marker: "arrow-system" },
        approved_by: { cls: "system", marker: "arrow-system" },
        simulated_as: { cls: "simulation", marker: "arrow-simulation" },
        mitigates: { cls: "control", marker: "arrow-control" }
      };

      class GraphEntity {
        constructor({ id, type, label, state = "normal", metrics = {}, metadata = {}, tags = [], chart = null, rankHint = 0, projectionRole = "live", pinned = null, insight = "", root_cause_probability = null }) {
          this.id = id;
          this.type = type;
          this.label = label;
          this.state = state;
          this.metrics = metrics;
          this.metadata = metadata;
          this.tags = tags;
          this.chart = chart;
          this.rankHint = rankHint;
          this.projectionRole = projectionRole;
          this.pinned = pinned;
          this.insight = insight;
          this.root_cause_probability = Number.isFinite(root_cause_probability) ? root_cause_probability : null;
        }
      }

      class GraphRelation {
        constructor({ id, from, to, type }) {
          this.id = id;
          this.from = from;
          this.to = to;
          this.type = type;
        }
      }

      class PlantKnowledgeGraph {
        constructor() {
          this.entities = new Map();
          this.relations = [];
        }
        addEntity(e) { this.entities.set(e.id, e); }
        addRelation(r) { this.relations.push(r); }
        getEntity(id) { return this.entities.get(id); }
        getRelationsFrom(id) { return this.relations.filter((r) => r.from === id); }
        getRelationsTo(id) { return this.relations.filter((r) => r.to === id); }
      }

      class GraphStateStore {
        static save(state) {
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
        }
        static load() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : null;
          } catch (_) {
            return null;
          }
        }
      }

      class IncidentSubgraphExtractor {
        static extract(graph, incidentId) {
          const keep = new Set([incidentId]);
          const upQueue = [incidentId];
          const downQueue = [incidentId];

          for (let depth = 0; depth < 3; depth += 1) {
            const next = [];
            upQueue.splice(0).forEach((id) => {
              graph.getRelationsTo(id).forEach((r) => {
                if (!keep.has(r.from)) {
                  keep.add(r.from);
                  next.push(r.from);
                }
              });
            });
            upQueue.push(...next);
          }

          for (let depth = 0; depth < 4; depth += 1) {
            const next = [];
            downQueue.splice(0).forEach((id) => {
              graph.getRelationsFrom(id).forEach((r) => {
                if (!keep.has(r.to)) {
                  keep.add(r.to);
                  next.push(r.to);
                }
              });
            });
            downQueue.push(...next);
          }

          const forced = [
            "material_foil", "sensor_tension", "control_heater", "asset_sealer", "deviation",
            "quality_seal", "batch_current", "batch_golden", "impact_loss", "sim_unchanged", "sim_corrected",
            "sys_mes", "sys_qa", "sys_erp",
            "aux_sensor_2", "aux_asset_2"
          ];
          forced.forEach((id) => keep.add(id));

          return {
            entities: Array.from(keep).map((id) => graph.getEntity(id)).filter(Boolean),
            relations: graph.relations.filter((r) => keep.has(r.from) && keep.has(r.to))
          };
        }
      }

      function buildProjectionRelations(subgraph) {
        const byId = new Map(subgraph.entities.map((e) => [e.id, e]));
        const allow = new Set([
          "reference->live",
          "cause->live",
          "live->live",
          "live->consequence",
          "live->simulation",
          "simulation->consequence",
          "simulation->endpoint",
          "consequence->endpoint"
        ]);
        return subgraph.relations.filter((r) => {
          const fromRole = byId.get(r.from)?.projectionRole;
          const toRole = byId.get(r.to)?.projectionRole;
          if (!fromRole || !toRole) return false;
          return allow.has(`${fromRole}->${toRole}`);
        });
      }

      class LayoutEngine {
        static persistedPositionsAreValid(persistedPositions) {
          if (!persistedPositions || typeof persistedPositions !== "object") return false;
          const core = [
            "material_foil", "sensor_tension", "control_heater", "asset_sealer",
            "deviation", "quality_seal", "batch_current", "sim_unchanged",
            "sim_corrected", "impact_loss", "sys_mes", "sys_qa", "sys_erp"
          ];
          for (const id of core) {
            const p = persistedPositions[id];
            if (!p || !Number.isFinite(p.x) || !Number.isFinite(p.y)) return false;
            if (p.x < 120 || p.x > 2600 || p.y < 60 || p.y > 1900) return false;
          }
          return true;
        }

        static sizeClass(entity) {
          if (entity.type === "GoldenBatch" || entity.id === "batch_current") return "anchor-card";
          if (entity.type === "SimulationScenario") return "simulation-card";
          if (entity.type === "ExternalSystem") return "system-card";
          return "process-card";
        }

        static estimate(entity) {
          const cls = LayoutEngine.sizeClass(entity);
          const metricsCount = Object.keys(entity.metrics || {}).length;
          let width, height;
          if (cls === "anchor-card") {
            width = entity.chart ? 560 : 520;
            height = entity.chart ? 360 : 240;
          } else if (cls === "simulation-card") {
            width = 420;
            height = 220;
          } else if (cls === "system-card") {
            width = 320;
            height = 130 + metricsCount * 26;
          } else {
            width = entity.chart ? 440 : 400;
            height = entity.chart ? 300 : 160 + metricsCount * 28;
          }
          return { width, height };
        }

        static run(subgraph, projectionRelations, persistedPositions = {}) {
          const g = new dagre.graphlib.Graph();
          g.setGraph({
            rankdir: "LR",
            ranksep: 180,
            nodesep: 120,
            marginx: 80,
            marginy: 80,
            ranker: "network-simplex"
          });
          g.setDefaultEdgeLabel(() => ({}));

          subgraph.entities.forEach((e) => {
            const sz = LayoutEngine.estimate(e);
            g.setNode(e.id, {
              width: sz.width,
              height: sz.height,
              rank: e.rankHint
            });
          });

          subgraph.relations.forEach((r) => {
            g.setEdge(r.from, r.to, { weight: 2, minlen: 1 });
          });

          dagre.layout(g);

          const positions = {};
          subgraph.entities.forEach((e) => {
            const n = g.node(e.id);
            positions[e.id] = {
              x: n.x - n.width / 2,
              y: n.y - n.height / 2
            };
          });

          // Backup layout behavior: pinned golden reference + simple simulation row alignment.
          LayoutEngine.compactProjection(subgraph, positions);

          if (LayoutEngine.persistedPositionsAreValid(persistedPositions)) {
            Object.keys(persistedPositions || {}).forEach((id) => {
              if (positions[id]) positions[id] = persistedPositions[id];
            });
          }

          LayoutEngine.ensureNoGoldenOverlap(positions);
          LayoutEngine.ensureScenePadding(positions, 120, 60);

          return positions;
        }

        static compactProjection(subgraph, positions) {
          positions.batch_golden = { x: 80, y: 70 };

          if (positions.batch_current && positions.sim_unchanged && positions.sim_corrected) {
            const by = positions.batch_current.y + 350;
            positions.sim_unchanged.y = by;
            positions.sim_corrected.y = by;
          }
        }

        static ensureNoGoldenOverlap(positions) {
          const g = positions.batch_golden;
          if (!g) return;
          const golden = { x: g.x, y: g.y, w: 560, h: 380 };
          const candidates = ["material_foil", "sensor_tension", "control_heater", "asset_sealer"];
          const widths = {
            material_foil: 380, sensor_tension: 380, control_heater: 380, asset_sealer: 440
          };
          candidates.forEach((id) => {
            const p = positions[id];
            if (!p) return;
            const w = widths[id] || 360;
            const h = 250;
            const overlaps = (
              p.x < golden.x + golden.w &&
              p.x + w > golden.x &&
              p.y < golden.y + golden.h &&
              p.y + h > golden.y
            );
            if (overlaps) {
              positions[id].y = golden.y + golden.h + 36;
            }
          });
        }

        static ensureScenePadding(positions, minX = 72, minY = 36) {
          const ids = Object.keys(positions || {});
          if (!ids.length) return;
          const minPosX = Math.min(...ids.map((id) => Number(positions[id]?.x || 0)));
          const minPosY = Math.min(...ids.map((id) => Number(positions[id]?.y || 0)));
          const dx = minPosX < minX ? (minX - minPosX) : 0;
          const dy = minPosY < minY ? (minY - minPosY) : 0;
          if (!dx && !dy) return;
          ids.forEach((id) => {
            if (!positions[id]) return;
            positions[id].x += dx;
            positions[id].y += dy;
          });
        }
      }

      class Renderer {
        constructor(state) {
          this.state = state;
          this.board = document.getElementById("board");
          this.viewport = document.getElementById("viewport");
          this.nodeLayer = document.getElementById("nodeLayer");

          this.framePending = false;
          this.dragging = null;
          this.commandHistory = [];
          this.zoom = d3.zoom().scaleExtent([0.5, 2.2]).filter((event) => {
            if (this.dragging) return false;
            const target = event.target;
            if (target && target.closest && target.closest(".node")) return false;
            return !event.ctrlKey || event.type === "wheel";
          }).on("zoom", (event) => {
            this.state.transform = event.transform;
            this.viewport.style.transform = `translate(${event.transform.x}px, ${event.transform.y}px) scale(${event.transform.k})`;
          });
          d3.select(this.board).call(this.zoom).on("dblclick.zoom", null);
          d3.select(this.board).on("dblclick", () => {
            this.resetView();
          });
          this.bindActionEvents();
          this.bindFocusExit();
          this.bindCommandSurface();
          this.bindTimelineEvents();
          this.bindHotkeys();
        }

        defaultFocusSeeds(focusId) {
          const map = {
            deviation: ["asset_sealer", "quality_seal", "batch_current", "batch_golden", "impact_loss", "sensor_tension", "control_heater", "material_foil"],
            batch_current: ["quality_seal", "sim_unchanged", "sim_corrected", "impact_loss"],
            impact_loss: ["sim_unchanged", "sim_corrected", "sys_mes", "sys_qa", "sys_erp"],
            sys_mes: ["impact_loss", "sim_unchanged", "sim_corrected"],
            sys_qa: ["deviation", "sim_unchanged"],
            sys_erp: ["impact_loss", "sim_corrected"]
          };
          return map[focusId] || [];
        }

        cameraScopeForFocus(focusId, seedIds = []) {
          const map = {
            deviation: ["material_foil", "sensor_tension", "control_heater", "asset_sealer", "deviation", "quality_seal", "batch_current"],
            batch_current: ["quality_seal", "batch_current", "sim_unchanged", "sim_corrected", "impact_loss"],
            impact_loss: ["impact_loss", "sim_unchanged", "sim_corrected", "sys_mes", "sys_qa", "sys_erp"],
            sys_mes: ["sim_unchanged", "sim_corrected", "impact_loss", "sys_mes", "sys_qa", "sys_erp"],
            sys_qa: ["sim_unchanged", "impact_loss", "sys_mes", "sys_qa", "sys_erp"],
            sys_erp: ["sim_corrected", "impact_loss", "sys_mes", "sys_qa", "sys_erp"]
          };
          const scoped = map[focusId] || [focusId, ...seedIds];
          return Array.from(new Set(scoped.filter(Boolean)));
        }

        getConnectedImpactNeighborhood(rootId) {
          const relations = this.state.projection?.relations || [];
          const entityIds = new Set(this.state.subgraph.entities.map((e) => e.id));
          const nodeIds = new Set([rootId]);
          const edgeIds = new Set();

          let frontierUp = [rootId];
          for (let depth = 0; depth < 3; depth += 1) {
            const next = [];
            frontierUp.forEach((id) => {
              relations.forEach((r) => {
                if (r.to === id && entityIds.has(r.from) && entityIds.has(r.to)) {
                  nodeIds.add(r.from);
                  nodeIds.add(r.to);
                  edgeIds.add(r.id);
                  next.push(r.from);
                }
              });
            });
            frontierUp = next;
            if (!frontierUp.length) break;
          }

          let frontierDown = [rootId];
          for (let depth = 0; depth < 4; depth += 1) {
            const next = [];
            frontierDown.forEach((id) => {
              relations.forEach((r) => {
                if (r.from === id && entityIds.has(r.from) && entityIds.has(r.to)) {
                  nodeIds.add(r.from);
                  nodeIds.add(r.to);
                  edgeIds.add(r.id);
                  next.push(r.to);
                }
              });
            });
            frontierDown = next;
            if (!frontierDown.length) break;
          }

          return {
            nodeIds: Array.from(nodeIds),
            edgeIds: Array.from(edgeIds)
          };
        }

        enterFocusMode(nodeId, options = {}) {
          const neighborhood = options.neighborhood || this.getConnectedImpactNeighborhood(nodeId);
          const center = options.center !== false;
          this.state.focus = nodeId;
          this.state.actionMode = true;
          this.applyFocus(nodeId, {
            neighborhood,
            center,
            seedIds: options.seedIds || []
          });
          this.nodeLayer.querySelectorAll(".node").forEach((el) => {
            const id = el.getAttribute("data-id");
            el.classList.toggle("focus-root", id === nodeId);
          });
          if (this.focusExit) this.focusExit.classList.add("show");
          this.updateActionsForFocus(nodeId, new Set(neighborhood.nodeIds || []));
        }

        bindFocusExit() {
          if (this.focusExit) {
            this.focusExit.addEventListener("click", (e) => {
              e.stopPropagation();
              this.exitFocusMode();
            });
          }
          window.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && this.state.actionMode && !this.dragging) this.exitFocusMode();
          });
        }

        bindHotkeys() {
          window.addEventListener("keydown", (e) => {
            if (e.metaKey || e.ctrlKey) {
              if (e.key.toLowerCase() === "k") {
                e.preventDefault();
                this.openCommandSurface();
              }
              return;
            }
            if (/^[1-5]$/.test(e.key)) {
              const idx = Number(e.key) - 1;
              const btn = this.actionsBar?.querySelectorAll(".action-btn")?.[idx];
              if (btn) btn.click();
            }
            if (e.key.toLowerCase() === "f") {
              if (this.state.actionMode) this.exitFocusMode();
              else this.enterFocusMode("deviation");
            }
          });
        }

        bindCommandSurface() {
          if (!this.commandBtn || !this.commandMenu || !this.commandInput || !this.commandList) return;
          const commands = [
            "show drift path",
            "isolate root cause",
            "show affected systems",
            "compare to golden batch",
            "simulate correction",
            "explain deviation"
          ];
          const renderList = (q = "") => {
            const pool = [...this.commandHistory.slice(-3).reverse(), ...commands];
            const uniq = Array.from(new Set(pool));
            const filtered = uniq.filter((c) => c.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
            this.commandList.innerHTML = filtered.map((c) => `<button class="command-item" data-cmd="${c}">${c}</button>`).join("");
            this.commandList.querySelectorAll(".command-item").forEach((el) => {
              el.addEventListener("click", () => {
                this.executeGraphCommand(el.getAttribute("data-cmd") || "");
                this.closeCommandSurface();
              });
            });
          };
          this.commandBtn.addEventListener("click", () => this.openCommandSurface());
          this.commandInput.addEventListener("input", () => renderList(this.commandInput.value));
          this.commandInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              const cmd = this.commandInput.value.trim();
              if (cmd) {
                this.executeGraphCommand(cmd);
                this.closeCommandSurface();
              }
            }
          });
          document.addEventListener("click", (e) => {
            if (!this.commandMenu.classList.contains("show")) return;
            if (e.target.closest("#commandMenu") || e.target.closest("#commandBtn")) return;
            this.closeCommandSurface();
          });
          this.renderCommandList = renderList;
        }

        bindTimelineEvents() {
          const timeline = document.getElementById("timeline");
          if (!timeline) return;
          timeline.querySelectorAll(".event").forEach((el) => {
            el.addEventListener("click", () => {
              const ids = (el.getAttribute("data-focus") || "").split(",").map((s) => s.trim()).filter(Boolean);
              if (!ids.length) return this.enterFocusMode("deviation");
              this.enterFocusMode(ids[0], { seedIds: ids.slice(1) });
            });
          });
        }

        openCommandSurface() {
          if (!this.commandMenu) return;
          this.commandMenu.classList.add("show");
          this.renderCommandList?.("");
          requestAnimationFrame(() => this.commandInput?.focus());
        }

        closeCommandSurface() {
          if (!this.commandMenu) return;
          this.commandMenu.classList.remove("show");
          if (this.commandInput) this.commandInput.value = "";
        }

        executeGraphCommand(cmdRaw) {
          const cmd = cmdRaw.toLowerCase().trim();
          if (!cmd) return;
          this.commandHistory.push(cmdRaw);
          if (cmd.includes("drift path")) return this.enterFocusMode("sensor_tension", { seedIds: ["material_foil", "control_heater", "asset_sealer", "deviation"] });
          if (cmd.includes("root cause")) return this.enterFocusMode("sensor_tension", { seedIds: ["material_foil", "control_heater"] });
          if (cmd.includes("affected systems")) return this.enterFocusMode("impact_loss", { seedIds: ["sys_mes", "sys_qa", "sys_erp"] });
          if (cmd.includes("golden")) return this.enterFocusMode("batch_golden", { seedIds: ["batch_current"] });
          if (cmd.includes("simulate correction")) return this.enterFocusMode("sim_corrected", { seedIds: ["impact_loss", "batch_current"] });
          if (cmd.includes("explain deviation")) return this.enterFocusMode("deviation", { seedIds: ["asset_sealer", "quality_seal"] });
          this.enterFocusMode("deviation");
        }

        bindActionEvents() {
          if (!this.actionsBar) return;
          const focusMap = {
            reduce_speed: "batch_current",
            adjust_heater: "control_heater",
            log_mes: "deviation",
            notify_qa: "deviation",
            update_erp: "impact_loss"
          };
          this.actionsBar.querySelectorAll(".action-btn").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              const action = btn.getAttribute("data-action");
              const root = focusMap[action] || "deviation";
              this.enterFocusMode(root);
              btn.classList.add("active");
              if (!btn.dataset.confirming) {
                btn.dataset.confirming = "1";
                btn.classList.add("queued");
                setTimeout(() => {
                  btn.classList.remove("queued");
                  delete btn.dataset.confirming;
                }, 1800);
              }
            });
          });
        }

        scheduleRender() {
          if (this.framePending) return;
          this.framePending = true;
          requestAnimationFrame(() => {
            this.framePending = false;
            this.render();
          });
        }

        getBoundsFor(ids) {
          const targetIds = Array.isArray(ids) && ids.length ? ids : this.state.subgraph.entities.map((e) => e.id);
          const rects = targetIds.map((id) => this.nodeRect(id)).filter(Boolean);
          if (!rects.length) return null;
          const minX = Math.min(...rects.map((r) => r.x));
          const minY = Math.min(...rects.map((r) => r.y));
          const maxX = Math.max(...rects.map((r) => r.x + r.w));
          const maxY = Math.max(...rects.map((r) => r.y + r.h));
          return { minX, minY, maxX, maxY, width: maxX - minX, height: maxY - minY };
        }

        fitToScene(animated = true) {
          const incidentIds = [
            "batch_golden","material_foil","sensor_tension","control_heater","asset_sealer",
            "deviation","quality_seal","batch_current","sim_unchanged","sim_corrected",
            "impact_loss","sys_mes","sys_qa","sys_erp"
          ];
          const b = this.getBoundsFor(incidentIds);
          if (!b) return;
          const viewW = this.board.clientWidth;
          const viewH = this.board.clientHeight;
          const pad = 60;
          const fitW = (viewW - pad * 2) / Math.max(1, b.width);
          const fitH = (viewH - pad * 2) / Math.max(1, b.height);
          const scale = Math.max(0.28, Math.min(2.2, Math.min(fitW, fitH)));
          document.documentElement.style.setProperty("--fit-scale", scale);
          let tx = (viewW - b.width * scale) / 2 - b.minX * scale;
          const ty = (viewH - b.height * scale) / 2 - b.minY * scale;
          const gutter = 120;
          const minTx = gutter - b.minX * scale;
          const maxTx = (viewW - gutter) - b.maxX * scale;
          if (minTx <= maxTx) {
            tx = Math.max(minTx, Math.min(maxTx, tx));
          } else {
            tx = (minTx + maxTx) / 2;
          }

          const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
          const sel = d3.select(this.board);
          if (animated) sel.transition().duration(260).call(this.zoom.transform, t);
          else sel.call(this.zoom.transform, t);
        }

        centerOnNodes(ids, animated = true, minScale = 0.72) {
          const b = this.getBoundsFor(ids);
          if (!b) return;
          const viewW = this.board.clientWidth;
          const viewH = this.board.clientHeight;
          const pad = 160;
          const scale = Math.max(minScale, Math.min(2.2, Math.min((viewW - pad * 2) / b.width, (viewH - pad * 2) / b.height)));
          let tx = (viewW - b.width * scale) / 2 - b.minX * scale;
          const ty = (viewH - b.height * scale) / 2 - b.minY * scale;
          const gutter = 100;
          const minTx = gutter - b.minX * scale;
          const maxTx = (viewW - gutter) - b.maxX * scale;
          if (minTx <= maxTx) {
            tx = Math.max(minTx, Math.min(maxTx, tx));
          } else {
            tx = (minTx + maxTx) / 2;
          }
          const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
          const sel = d3.select(this.board);
          if (animated) sel.transition().duration(260).call(this.zoom.transform, t);
          else sel.call(this.zoom.transform, t);
        }

        resetView() {
          this.fitToScene(true);
        }

        exitFocusMode() {
          this.state.focus = null;
          this.state.actionMode = false;
          this.nodeLayer.querySelectorAll(".node").forEach((el) => {
            el.classList.remove("dimmed", "focal", "focus-root", "expanded");
          });
          this.edgeLayer.selectAll("path.edge")
            .classed("focused", false)
            .classed("dimmed", false);
          this.edgeLayer.selectAll("text.edge-label").classed("focused", false);
          if (this.focusExit) this.focusExit.classList.remove("show");
          if (this.actionsBar) {
            this.actionsBar.querySelectorAll(".action-btn").forEach((btn) => {
              btn.classList.remove("active", "dimmed");
            });
          }
          this.fitToScene(true);
        }

        chartPluginDeviationMarker(markerIndex) {
          return {
            id: `dev-marker-${markerIndex}`,
            afterDatasetsDraw(chart) {
              const { ctx, chartArea, scales } = chart || {};
              if (!ctx || !chartArea || !scales || !scales.x || !scales.y) return;
              const x = scales.x.getPixelForValue(markerIndex);
              if (!Number.isFinite(x)) return;
              ctx.save();
              const dark = document.body.classList.contains("dark");
              ctx.strokeStyle = dark ? "#ff6b6b" : "#DC2626";
              ctx.setLineDash([4, 3]);
              ctx.lineWidth = 1.2;
              ctx.beginPath();
              ctx.moveTo(x, chartArea.top + 2);
              ctx.lineTo(x, chartArea.bottom);
              ctx.stroke();
              ctx.restore();
            }
          };
        }

        chartPluginCurrentMarker(datasetIndex) {
          return {
            id: `current-dot-${datasetIndex}`,
            afterDatasetsDraw(chart) {
              if (!chart || !chart.scales || !chart.scales.x || !chart.scales.y) return;
              const ds = chart.data.datasets[datasetIndex];
              if (!ds || !ds.data || !ds.data.length) return;
              let lastIdx = -1;
              for (let i = ds.data.length - 1; i >= 0; i -= 1) {
                const v = ds.data[i];
                if (v !== null && v !== undefined && Number.isFinite(v)) {
                  lastIdx = i;
                  break;
                }
              }
              if (lastIdx < 0) return;
              const x = chart.scales.x.getPixelForValue(lastIdx);
              const y = chart.scales.y.getPixelForValue(ds.data[lastIdx]);
              if (!Number.isFinite(x) || !Number.isFinite(y)) return;
              const { ctx } = chart;
              if (!ctx) return;
              ctx.save();
              const dark = document.body.classList.contains("dark");
              ctx.fillStyle = dark ? "#6a93ff" : "#2F6BFF";
              ctx.beginPath();
              ctx.arc(x, y, 3, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
          };
        }
